<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071f4a">
  <meta name="description" content="北っ子ファイヤーズ ソフトボールクイズゲーム">
  <title>北っ子ファイヤーズ｜ソフトボールクイズゲーム</title>
  <style>
:root {
  --navy-950: #03132e;
  --navy-900: #071f4a;
  --navy-800: #0b3371;
  --navy-700: #164d96;
  --red-700: #b61919;
  --red-600: #d92920;
  --orange-500: #ff7a00;
  --orange-300: #ffb443;
  --gold-500: #dca92d;
  --cream: #fff9e9;
  --white: #fff;
  --ink: #15223b;
  --muted: #63708a;
  --success: #168653;
  --danger: #c62828;
  --shadow: 0 18px 42px rgba(1, 18, 48, .28);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  background: linear-gradient(180deg, #0a57a8 0%, #0a2b64 36%, #03132e 100%);
  overflow-x: hidden;
}
button, input { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }
a { color: inherit; }

.stadium-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at 14% 8%, rgba(255,255,255,.9) 0 4%, transparent 11%),
    radial-gradient(circle at 82% 5%, rgba(255,255,255,.8) 0 3%, transparent 10%),
    linear-gradient(180deg, rgba(49,155,237,.95) 0 28%, rgba(21,116,178,.88) 28% 38%, rgba(15,79,78,.92) 38% 55%, rgba(156,87,33,.9) 55% 100%);
}
.stadium-bg::before {
  content: "";
  position: absolute;
  left: -8%; right: -8%; bottom: 22%; height: 26%;
  background:
    repeating-linear-gradient(90deg, rgba(5,42,65,.6) 0 4px, transparent 4px 74px),
    repeating-linear-gradient(0deg, rgba(5,42,65,.42) 0 3px, transparent 3px 48px);
  transform: perspective(520px) rotateX(57deg);
  transform-origin: bottom;
  opacity: .55;
}
.stadium-bg::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0; height: 42%;
  background:
    radial-gradient(ellipse at 50% 75%, transparent 0 14%, rgba(255,255,255,.82) 14.2% 14.8%, transparent 15%),
    linear-gradient(180deg, rgba(141,78,31,.1), rgba(105,54,24,.62));
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 30;
  min-height: 58px;
  padding: max(8px, env(safe-area-inset-top)) 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(3, 19, 46, .9);
  border-bottom: 1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(12px);
}
.brand-button, .sound-button {
  border: 0;
  color: white;
  background: transparent;
  cursor: pointer;
}
.brand-button {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: .02em;
}
.brand-mark { font-size: 1.35rem; }
.sound-button {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  font-size: 1.15rem;
}

.app-shell {
  width: min(100%, 980px);
  margin: 0 auto;
  padding: 16px 12px calc(34px + var(--safe-bottom));
}
.app-footer {
  padding: 10px 16px calc(16px + var(--safe-bottom));
  text-align: center;
  color: rgba(255,255,255,.82);
  font-size: .76rem;
  background: rgba(3,19,46,.76);
}
.app-footer p { margin: 0; }

.hero {
  position: relative;
  overflow: hidden;
  min-height: 385px;
  padding: 24px 18px 20px;
  border: 3px solid rgba(255,202,75,.88);
  border-radius: 34px;
  color: white;
  background:
    radial-gradient(circle at 82% 18%, rgba(255,166,0,.25), transparent 35%),
    linear-gradient(145deg, rgba(3,26,70,.97), rgba(5,74,151,.92) 52%, rgba(8,31,77,.97));
  box-shadow: var(--shadow), inset 0 0 0 5px rgba(255,255,255,.08);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 10px);
  pointer-events: none;
}
.hero-flame {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--red-600), var(--orange-500));
  font-weight: 900;
  box-shadow: 0 6px 18px rgba(229,48,25,.35);
}
.hero-title {
  position: relative;
  z-index: 2;
  width: min(68%, 570px);
  margin: 12px 0 0;
  font-size: clamp(2rem, 6vw, 4.4rem);
  line-height: .98;
  letter-spacing: -.055em;
  text-shadow: 0 4px 0 #9d1616, 0 8px 18px rgba(0,0,0,.4);
}
.hero-subtitle {
  position: relative;
  z-index: 2;
  width: min(62%, 520px);
  margin: 14px 0 0;
  font-size: clamp(1rem, 2.6vw, 1.5rem);
  font-weight: 900;
  line-height: 1.35;
}
.hero-character {
  position: absolute;
  right: -2px;
  bottom: -20px;
  width: min(43%, 320px);
  max-height: 365px;
  object-fit: cover;
  object-position: 50% 36%;
  border-radius: 26px 0 0 0;
  filter: drop-shadow(-12px 14px 18px rgba(0,0,0,.35));
}
.hero-ribbon {
  position: relative;
  z-index: 3;
  display: inline-block;
  margin-top: 20px;
  padding: 9px 15px;
  max-width: 62%;
  border-radius: 9px;
  color: #fff4b9;
  background: linear-gradient(90deg, #ad1118, #e4311f, #ad1118);
  border: 2px solid #ffac33;
  font-weight: 900;
}

.status-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) repeat(2, minmax(100px, .65fr));
  gap: 10px;
  margin-top: 14px;
}
.status-card {
  min-width: 0;
  padding: 14px;
  border: 2px solid rgba(255,205,86,.92);
  border-radius: 18px;
  background: rgba(255,250,236,.96);
  box-shadow: var(--shadow);
}
.status-label { color: var(--muted); font-size: .79rem; font-weight: 800; }
.status-value { margin-top: 4px; font-weight: 1000; font-size: clamp(1.1rem, 3.2vw, 1.7rem); }
.rank-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  color: white;
  background: linear-gradient(90deg, var(--navy-900), var(--navy-700));
  border-radius: 11px;
  padding: 7px 10px;
  font-weight: 900;
}
.progress-track {
  height: 12px;
  overflow: hidden;
  margin-top: 10px;
  border-radius: 99px;
  background: #d6d9df;
}
.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #ff3729, #ff9c19);
  transition: width .35s ease;
}

.section-title {
  margin: 24px 0 12px;
  color: white;
  font-size: clamp(1.3rem, 4vw, 2rem);
  font-weight: 1000;
  text-shadow: 0 3px 12px rgba(0,0,0,.5);
}
.course-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.course-card {
  position: relative;
  min-height: 218px;
  padding: 16px;
  overflow: hidden;
  border: 3px solid var(--course-accent);
  border-radius: 24px;
  color: var(--ink);
  text-align: left;
  background: linear-gradient(155deg, rgba(255,255,255,.98), rgba(255,247,226,.94));
  box-shadow: var(--shadow), inset 0 0 0 3px rgba(255,255,255,.7);
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}
.course-card:active { transform: scale(.985); }
.course-card::after {
  content: "";
  position: absolute;
  inset: auto -28px -38px auto;
  width: 130px; height: 130px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--course-accent) 15%, transparent);
}
.course-number {
  position: absolute;
  top: 0; left: 0;
  display: grid;
  place-items: center;
  width: 43px; height: 43px;
  color: white;
  background: var(--course-accent);
  border-radius: 0 0 18px 0;
  font-size: 1.35rem;
  font-weight: 1000;
}
.course-icon { font-size: 2.4rem; margin-left: 36px; }
.course-card h3 { margin: 10px 0 6px; color: var(--course-accent); font-size: clamp(1.1rem, 3.3vw, 1.55rem); }
.course-count {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 99px;
  color: white;
  background: var(--course-accent);
  font-size: .82rem;
  font-weight: 900;
}
.course-desc { min-height: 42px; margin: 9px 0; color: #3c475b; font-size: .88rem; line-height: 1.45; }
.course-score {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-top: 8px;
  border-top: 1px solid #ddd5c5;
  font-size: .79rem;
  font-weight: 900;
}
.badge-dot { font-size: 1.5rem; filter: grayscale(1); opacity: .4; }
.badge-dot.unlocked { filter: none; opacity: 1; }

.badge-panel {
  margin-top: 14px;
  padding: 14px;
  border: 2px solid rgba(255,205,86,.86);
  border-radius: 24px;
  color: white;
  background: linear-gradient(180deg, rgba(4,35,84,.95), rgba(2,20,49,.98));
  box-shadow: var(--shadow);
}
.badge-list {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}
.badge-item { text-align: center; font-size: .68rem; font-weight: 800; }
.badge-medal {
  width: 58px; height: 66px;
  margin: 0 auto 6px;
  display: grid;
  place-items: center;
  border-radius: 28px 28px 36px 36px;
  border: 3px solid #e2b340;
  background: linear-gradient(145deg, #c7261e, #68131b);
  font-size: 1.8rem;
  filter: grayscale(1);
  opacity: .42;
}
.badge-item.unlocked .badge-medal { filter: none; opacity: 1; box-shadow: 0 0 22px rgba(255,190,54,.5); }

.primary-cta, .secondary-cta, .danger-cta {
  width: 100%;
  min-height: 56px;
  padding: 13px 18px;
  border: 0;
  border-radius: 18px;
  font-weight: 1000;
  cursor: pointer;
}
.primary-cta {
  margin-top: 18px;
  color: white;
  background: linear-gradient(180deg, #ff4a29, #c91318);
  border: 3px solid #ffc45b;
  box-shadow: 0 10px 0 #7e1114, 0 17px 28px rgba(0,0,0,.3);
  font-size: clamp(1.2rem, 4vw, 1.8rem);
}
.primary-cta:active { transform: translateY(5px); box-shadow: 0 5px 0 #7e1114; }
.secondary-cta { color: white; background: linear-gradient(180deg, var(--navy-700), var(--navy-900)); }
.danger-cta { color: white; background: linear-gradient(180deg, #e44938, #9d1111); }
.button-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }

.screen-card {
  overflow: hidden;
  border: 3px solid rgba(255,202,75,.86);
  border-radius: 28px;
  background: rgba(255,251,240,.98);
  box-shadow: var(--shadow);
}
.screen-head {
  padding: 14px 16px;
  color: white;
  background: linear-gradient(90deg, var(--navy-900), var(--navy-700));
}
.screen-head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.screen-title { margin: 0; font-size: clamp(1.2rem, 4vw, 1.7rem); }
.screen-sub { margin-top: 4px; color: rgba(255,255,255,.78); font-size: .82rem; }
.quiz-status {
  display: grid;
  grid-template-columns: 94px minmax(0, 1fr);
  gap: 12px;
  padding: 12px 14px 0;
}
.mini-rank-image {
  width: 94px;
  height: 118px;
  object-fit: cover;
  border-radius: 14px;
  border: 3px solid #d7ab43;
  background: #dbe7f5;
}
.status-stack { min-width: 0; }
.status-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 7px; font-size: .84rem; font-weight: 900; }
.question-wrap { padding: 14px; }
.category-pill {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 99px;
  color: white;
  background: var(--orange-500);
  font-size: .76rem;
  font-weight: 900;
}
.question-text { margin: 12px 0 14px; font-size: clamp(1.02rem, 4vw, 1.33rem); line-height: 1.62; font-weight: 900; }
.choice-list { display: grid; gap: 9px; }
.choice-button {
  width: 100%;
  min-height: 54px;
  padding: 12px 13px;
  display: grid;
  grid-template-columns: 34px minmax(0,1fr);
  gap: 8px;
  align-items: center;
  border: 2px solid #ccd3df;
  border-radius: 15px;
  color: var(--ink);
  text-align: left;
  background: white;
  cursor: pointer;
}
.choice-button:not(:disabled):active { transform: scale(.99); }
.choice-button:disabled { cursor: default; }
.choice-key {
  width: 30px; height: 30px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: white;
  background: var(--navy-700);
  font-weight: 1000;
}
.choice-button.correct { border-color: var(--success); background: #e7f8ef; }
.choice-button.wrong { border-color: var(--danger); background: #fdebea; }

.feedback {
  margin-top: 13px;
  padding: 14px;
  border-radius: 16px;
  background: #f2f5fa;
  border-left: 6px solid var(--navy-700);
}
.feedback.success { background: #e8f8ef; border-left-color: var(--success); }
.feedback.error { background: #fff0ef; border-left-color: var(--danger); }
.feedback h3 { margin: 0 0 8px; }
.feedback p { margin: 7px 0; line-height: 1.55; }
.source-link { display: inline-flex; margin-top: 5px; color: #0c55a2; font-size: .78rem; font-weight: 800; }
.ruling-grid { display: grid; gap: 7px; margin-top: 10px; }
.ruling-row { padding: 9px 10px; border-radius: 10px; background: rgba(255,255,255,.8); font-size: .84rem; }
.ruling-row strong { color: var(--navy-800); }

.batting-stage {
  position: relative;
  min-height: 450px;
  overflow: hidden;
  background:
    linear-gradient(180deg, #67b9f3 0 48%, #3d9e58 48% 69%, #a55f2e 69% 100%);
}
.batting-stage::before {
  content: "";
  position: absolute;
  left: 50%; bottom: 20px;
  width: 320px; height: 180px;
  transform: translateX(-50%);
  border: 4px solid rgba(255,255,255,.85);
  border-radius: 50% 50% 10% 10%;
}
.scoreboard-strip {
  position: relative;
  z-index: 3;
  margin: 12px;
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  border-radius: 13px;
  color: white;
  background: rgba(3,19,46,.86);
  font-size: .83rem;
  font-weight: 900;
}
.pitcher, .batter {
  position: absolute;
  bottom: 82px;
  display: grid;
  place-items: center;
  width: 86px; height: 132px;
  border-radius: 40px 40px 22px 22px;
  color: white;
  background: linear-gradient(180deg, #0b3475, #091d43);
  border: 4px solid #fff;
  font-size: 3rem;
  box-shadow: 0 12px 20px rgba(0,0,0,.25);
}
.pitcher { left: 7%; transform: scale(.78); }
.batter { right: 4%; }
.pitcher.throwing { animation: pitcherThrow .65s ease; }
.batter.swinging { animation: batterSwing .42s ease; }
.pitch-lane {
  position: absolute;
  left: 15%; right: 14%; top: 53%;
  height: 66px;
}
.perfect-zone {
  position: absolute;
  left: 68%;
  width: 15%;
  top: 0; bottom: 0;
  border: 3px dashed #ffeb3b;
  border-radius: 12px;
  background: rgba(255,227,55,.18);
  box-shadow: 0 0 24px rgba(255,235,59,.65);
}
.ball {
  position: absolute;
  left: 0; top: 17px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, white 0 35%, #ffde62 37% 100%);
  border: 2px solid #b41f22;
  box-shadow: 0 5px 10px rgba(0,0,0,.28);
  transform: translateX(0) scale(.6);
  opacity: 0;
}
.ball.live { opacity: 1; }
.ball.hit { animation: ballHit .9s ease-out forwards; }
.ball.homer { animation: ballHomer 1.2s ease-out forwards; }
.batting-controls {
  position: relative;
  z-index: 4;
  padding: 14px;
  background: rgba(255,251,240,.98);
}
.batting-message { min-height: 48px; margin: 0 0 10px; text-align: center; font-weight: 900; line-height: 1.45; }
.swing-button {
  width: 100%;
  min-height: 68px;
  border: 4px solid #ffda63;
  border-radius: 22px;
  color: white;
  background: linear-gradient(180deg, #ff5a28, #c50f18);
  box-shadow: 0 8px 0 #7b1115;
  font-size: 1.55rem;
  font-weight: 1000;
  cursor: pointer;
}
.swing-button:disabled { filter: grayscale(.6); opacity: .55; box-shadow: none; }
.pitch-button { margin-top: 10px; }
.result-flash {
  position: absolute;
  z-index: 6;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 20px;
  color: white;
  text-align: center;
  background: rgba(3,19,46,.72);
  font-size: clamp(2rem, 9vw, 4rem);
  font-weight: 1000;
  text-shadow: 0 4px 0 #9b1717;
  animation: popIn .35s ease;
}
.fire-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.fire-particles i { position: absolute; bottom: -30px; font-style: normal; animation: rise 1.2s ease-out forwards; }

.result-card { padding: 18px; }
.result-rank {
  display: grid;
  grid-template-columns: minmax(130px, .72fr) minmax(0, 1fr);
  gap: 16px;
  align-items: center;
}
.result-rank img { width: 100%; border-radius: 18px; border: 4px solid #d4a638; box-shadow: var(--shadow); }
.result-title { margin: 0; color: var(--navy-900); font-size: clamp(1.5rem, 5vw, 2.5rem); }
.score-table { display: grid; gap: 8px; margin-top: 15px; }
.score-row { display: flex; justify-content: space-between; gap: 10px; padding: 10px 12px; border-radius: 12px; background: #eef2f8; font-weight: 900; }
.score-row.total { color: white; background: linear-gradient(90deg, var(--red-600), var(--orange-500)); font-size: 1.2rem; }
.complete-banner { margin-top: 14px; padding: 15px; border-radius: 14px; color: white; text-align: center; background: linear-gradient(90deg,#b40c14,#ff7d00); font-weight: 1000; }

.review-list { display: grid; gap: 12px; padding: 14px; }
.review-card { padding: 14px; border-radius: 16px; background: #f3f5f9; border-left: 6px solid var(--red-600); }
.review-card h3 { margin: 0 0 9px; font-size: 1rem; line-height: 1.5; }
.review-card p { margin: 6px 0; line-height: 1.5; }
.empty-state { padding: 34px 18px; text-align: center; }

.toast {
  position: fixed;
  z-index: 50;
  left: 50%; bottom: calc(18px + var(--safe-bottom));
  transform: translateX(-50%);
  padding: 11px 16px;
  border-radius: 99px;
  color: white;
  background: rgba(3,19,46,.94);
  box-shadow: var(--shadow);
  font-weight: 900;
  animation: toast .3s ease;
}

@keyframes pitcherThrow {
  0% { transform: scale(.78) rotate(0); }
  45% { transform: scale(.78) rotate(-16deg) translateY(-8px); }
  100% { transform: scale(.78) rotate(8deg); }
}
@keyframes batterSwing {
  0% { transform: rotate(0); }
  55% { transform: rotate(-18deg) translateX(-5px); }
  100% { transform: rotate(0); }
}
@keyframes ballHit { to { transform: translate(170px,-170px) scale(.45); opacity: 0; } }
@keyframes ballHomer { to { transform: translate(220px,-390px) scale(.25); opacity: 0; } }
@keyframes popIn { from { opacity: 0; transform: scale(.75); } }
@keyframes rise { to { transform: translateY(-560px) rotate(180deg); opacity: 0; } }
@keyframes toast { from { opacity: 0; transform: translate(-50%,20px); } }

@media (max-width: 620px) {
  .app-shell { padding-inline: 9px; }
  .hero { min-height: 370px; padding: 18px 14px; }
  .hero-title { width: 70%; font-size: clamp(2rem, 10.2vw, 3.25rem); }
  .hero-subtitle { width: 64%; font-size: .98rem; }
  .hero-character { width: 47%; max-height: 315px; bottom: 0; }
  .hero-ribbon { max-width: 66%; font-size: .78rem; }
  .status-grid { grid-template-columns: 1fr 1fr; }
  .status-card:first-child { grid-column: 1 / -1; }
  .course-card { min-height: 230px; padding: 14px 12px; }
  .course-desc { font-size: .78rem; }
  .badge-list { grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .badge-medal { width: 48px; height: 56px; font-size: 1.5rem; }
  .badge-item { font-size: .58rem; }
  .result-rank { grid-template-columns: 120px minmax(0,1fr); }
}

@media (max-width: 370px) {
  .course-grid { gap: 8px; }
  .course-card { min-height: 246px; padding: 12px 9px; }
  .course-icon { margin-left: 31px; font-size: 2rem; }
  .course-card h3 { font-size: 1rem; }
  .course-desc { font-size: .73rem; }

          Object.keys(COURSES).map(key => [key, { ...base.courses[key], ...(saved.courses?.[key] || {}) }])
        )
      };
    } catch (error) {
      console.warn('保存データを読み込めませんでした。', error);
      return defaultProgress();
    }
  }

  function saveProgress() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }

  function esc(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function getRank(score) {
    let rank = RANKS[0];
    for (const candidate of RANKS) {
      if (score >= candidate.min) rank = candidate;
    }
    return rank;
  }

  function getOverallScore() {
    const sum = Object.values(progress.courses).reduce((total, item) => total + (item.bestScore || 0), 0);
    return Math.round(sum / Object.keys(COURSES).length);
  }

  function getTotalBest() {
    return Object.values(progress.courses).reduce((total, item) => total + (item.bestScore || 0), 0);
  }

  function getBadgeCount() {
    return Object.values(progress.courses).filter(item => item.badge).length;
  }

  function isConquered() {
    return Object.values(progress.courses).every(item => item.badge);
  }

    image.src = rank.image;

  function startCourse(courseKey) {
    if (!COURSES[courseKey]) return;
    state.view = 'quiz';
    state.course = courseKey;
    state.questions = window.QUESTIONS.filter(item => item.course === courseKey);
    state.index = 0;
    state.correct = 0;
    state.answers = [];
    state.answered = false;
    state.batting = null;
    prepareQuestion();
    renderQuiz();
  }

  function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function prepareQuestion() {
    const question = state.questions[state.index];
    const indexed = question.choices.map((text, originalIndex) => ({ text, originalIndex }));
    const shuffled = shuffle(indexed);
    state.displayChoices = shuffled;
    state.correctDisplayIndex = shuffled.findIndex(item => item.originalIndex === question.correctIndex);
    state.answered = false;
    state.selectedDisplayIndex = -1;
  }

  function getLiveRankScore() {
    const questionCount = state.questions.length || 1;
    return Math.round((state.correct / questionCount) * 90);
  }

  function renderQuiz() {
    const course = COURSES[state.course];
    const question = state.questions[state.index];
    const liveScore = getLiveRankScore();
    const rank = getRank(liveScore);
    const progressPercent = Math.round((state.index / state.questions.length) * 100);
    const letters = ['A', 'B', 'C', 'D'];

    const choices = state.displayChoices.map((choice, index) => {
      let className = 'choice-button';
      if (state.answered && index === state.correctDisplayIndex) className += ' correct';
      if (state.answered && index === state.selectedDisplayIndex && index !== state.correctDisplayIndex) className += ' wrong';
      return `
        <button class="${className}" type="button" data-action="answer" data-index="${index}" ${state.answered ? 'disabled' : ''}>
          <span class="choice-key">${letters[index]}</span>
          <span>${esc(choice.text)}</span>
        </button>`;
    }).join('');

    let feedback = '';
    if (state.answered) {
      const isCorrect = state.selectedDisplayIndex === state.correctDisplayIndex;
      const ruling = state.course === 'umpire' ? `
        <div class="ruling-grid">
          <div class="ruling-row"><strong>審判の宣告：</strong>${esc(question.ruling)}</div>
          <div class="ruling-row"><strong>ボールの状態：</strong>${esc(question.ballStatus)}</div>
          <div class="ruling-row"><strong>走者の処置：</strong>${esc(question.runnerPlacement)}</div>
        </div>` : '';
      feedback = `
        <div class="feedback ${isCorrect ? 'success' : 'error'}">
          <h3>${isCorrect ? '🔥 正解！ナイスプレー！' : '🥎 惜しい！次の1球へ！'}</h3>
          <p><strong>正しい答え：</strong>${esc(state.displayChoices[state.correctDisplayIndex].text)}</p>
          <p>${esc(question.explanation)}</p>
          ${ruling}
          <a class="source-link" href="${esc(question.sourceUrl)}" target="_blank" rel="noopener noreferrer">根拠：${esc(question.source)} ↗</a>
          <button class="primary-cta" style="margin-top:14px" data-action="next-question" type="button">${state.index + 1 === state.questions.length ? '最終打撃チャレンジへ' : '次の問題へ'} ▶</button>
        </div>`;
    }

    app.innerHTML = `
      <section class="screen-card">
        <header class="screen-head">
          <div class="screen-head-row">
            <div>
              <h1 class="screen-title">${esc(course.title)}</h1>
              <div class="screen-sub">問題 ${state.index + 1} / ${state.questions.length}</div>
            </div>
            <strong>${state.correct} 正解</strong>
          </div>
        </header>

        <div class="quiz-status">
          <img class="mini-rank-image" src="${rank.image}" width="94" height="118" alt="現在のランク ${esc(rank.name)}">
          <div class="status-stack">
            <div class="status-line"><span>現在のランク</span><strong>${esc(rank.name)}</strong></div>
            <div class="status-line"><span>進捗</span><strong>${progressPercent}%</strong></div>
            <div class="progress-track"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
            <div class="status-line" style="margin-top:12px"><span>難易度</span><strong>${'★'.repeat(question.difficulty)}${'☆'.repeat(5 - question.difficulty)}</strong></div>
          </div>
        </div>

        <div class="question-wrap">
          <span class="category-pill">${esc(question.category)}</span>
          <h2 class="question-text">${esc(question.question)}</h2>
          <div class="choice-list">${choices}</div>
          ${feedback}
        </div>
      </section>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function answerQuestion(displayIndex) {
    if (state.answered) return;
    const question = state.questions[state.index];
    const selected = state.displayChoices[displayIndex];
    if (!selected) return;

    state.answered = true;
    state.selectedDisplayIndex = displayIndex;
    const isCorrect = displayIndex === state.correctDisplayIndex;
    if (isCorrect) state.correct += 1;

    state.answers.push({
      id: question.id,
      selectedText: selected.text,
      correctText: state.displayChoices[state.correctDisplayIndex].text,
      isCorrect,
      question: question.question,
      explanation: question.explanation,
      source: question.source,
      sourceUrl: question.sourceUrl,
      ruling: question.ruling,
      ballStatus: question.ballStatus,
      runnerPlacement: question.runnerPlacement
    });

    playTone(isCorrect ? 'correct' : 'wrong');
    renderQuiz();
  }

  function nextQuestion() {
    if (!state.answered) return;
    if (state.index + 1 >= state.questions.length) {
      renderBatting();
      return;
    }
    state.index += 1;
    prepareQuestion();
    renderQuiz();
  }

  function renderBatting() {
    state.view = 'batting';
    state.batting = {
      started: false,
      resolved: false,
      progress: 0,
      result: '',
      score: 0,
      rafId: 0,
      startTime: 0,
      duration: 1650
    };
    const quizScore = Math.round((state.correct / state.questions.length) * 90);
    const course = COURSES[state.course];

    app.innerHTML = `
      <section class="screen-card">
        <header class="screen-head">
          <h1 class="screen-title">最終打撃チャレンジ</h1>
          <div class="screen-sub">${esc(course.title)}｜クイズ得点 ${quizScore} / 90</div>
        </header>
        <div class="batting-stage" id="battingStage">
          <div class="scoreboard-strip"><span>タイミングよくスイング！</span><span>ホームラン確率 50%</span></div>
          <div class="pitcher" id="pitcher" aria-label="ピッチャー">⚾</div>

          <button class="swing-button" id="swingButton" data-action="swing" type="button" disabled>🔥 スイング！</button>
          <button class="secondary-cta pitch-button" id="pitchButton" data-action="start-pitch" type="button">🥎 投球開始</button>
        </div>
      </section>`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function startPitch() {
    const batting = state.batting;
    if (!batting || batting.started || batting.resolved) return;
    batting.started = true;
    batting.startTime = performance.now();
    const ball = document.getElementById('ball');
    const pitcher = document.getElementById('pitcher');
    const swingButton = document.getElementById('swingButton');
    const pitchButton = document.getElementById('pitchButton');
    const message = document.getElementById('battingMessage');
    ball?.classList.add('live');
    pitcher?.classList.add('throwing');
    if (swingButton) swingButton.disabled = false;
    if (pitchButton) pitchButton.disabled = true;
    if (message) message.textContent = 'ボールをよく見て……スイング！';
    playTone('pitch');

    const tick = now => {
      if (!state.batting || state.batting.resolved) return;
      const lane = document.getElementById('pitchLane');
      const currentBall = document.getElementById('ball');
      if (!lane || !currentBall) return;
      const elapsed = now - batting.startTime;
      batting.progress = Math.min(1, elapsed / batting.duration);
      const travel = Math.max(0, lane.clientWidth - 34);
      const scale = 0.55 + batting.progress * 0.7;
      currentBall.style.transform = `translateX(${travel * batting.progress}px) scale(${scale})`;
      if (batting.progress >= 1) {
        settleBatting('out');
        return;
      }
      batting.rafId = requestAnimationFrame(tick);
    };
    batting.rafId = requestAnimationFrame(tick);
  }

  function swingBat() {
    const batting = state.batting;
    if (!batting || !batting.started || batting.resolved) return;
    const batter = document.getElementById('batter');
    const swingButton = document.getElementById('swingButton');
    batter?.classList.add('swinging');
    if (swingButton) swingButton.disabled = true;

    const perfect = batting.progress >= 0.68 && batting.progress <= 0.83;
    if (perfect) {
      settleBatting(Math.random() < 0.5 ? 'homerun' : 'hit-perfect');
    } else {
      settleBatting('hit');
    }
  }

  function settleBatting(result) {
    const batting = state.batting;
    if (!batting || batting.resolved) return;
    batting.resolved = true;
    cancelAnimationFrame(batting.rafId);

    const ball = document.getElementById('ball');
    const swingButton = document.getElementById('swingButton');
    const message = document.getElementById('battingMessage');
    if (swingButton) swingButton.disabled = true;

    let label = '';
    let detail = '';
    let score = 0;
    if (result === 'homerun') {
      label = '🔥 ファイヤー！ホームラン！';
      detail = '完璧なタイミングから、50％抽選を突破！';
      score = 10;
      ball?.classList.add('homer');
      createFireParticles();
      playTone('homerun');
      if (navigator.vibrate) navigator.vibrate([80, 50, 120]);
    } else if (result === 'hit-perfect') {
      label = '🥎 惜しい！完璧タイミングのヒット！';
      detail = 'タイミングは完璧。抽選結果はナイスヒット！';
      score = 5;
      ball?.classList.add('hit');
      playTone('hit');
    } else if (result === 'hit') {
      label = '👏 ナイスヒット！';
      detail = 'タイミングは少しずれましたが、しっかり振り切りました。';
      score = 5;
      ball?.classList.add('hit');
      playTone('hit');
    } else {
      label = '😵 見逃しアウト！';
      detail = 'バットを振らなければ当たらない！';
      score = 0;
      ball?.classList.remove('live');
      playTone('wrong');
    }

    batting.result = result;
    batting.score = score;
    if (message) message.innerHTML = `<strong>${esc(label)}</strong><br>${esc(detail)}<br>打撃得点：${score}点`;

    const stage = document.getElementById('battingStage');
    if (stage) {
      const flash = document.createElement('div');
      flash.className = 'result-flash';
      flash.textContent = label;
      stage.appendChild(flash);
      setTimeout(() => flash.remove(), 1000);
    }

    const controls = document.getElementById('battingControls');
    if (controls) {
      const button = document.createElement('button');
      button.className = 'primary-cta';
      button.type = 'button';
      button.dataset.action = 'show-result';
      button.textContent = '合計得点とランクを見る ▶';
      controls.appendChild(button);
    }

    saveAttemptResult();
  }

  function saveAttemptResult() {
    const quizScore = Math.round((state.correct / state.questions.length) * 90);
    const totalScore = quizScore + state.batting.score;
    const record = progress.courses[state.course];
    const wrongIds = state.answers.filter(answer => !answer.isCorrect).map(answer => answer.id);

    record.completed = true;
    record.latestWrongIds = wrongIds;
    record.battingResult = state.batting.result;
    if (totalScore > record.bestScore) {
      record.bestScore = totalScore;
      record.bestCorrect = state.correct;
    } else if (state.correct > record.bestCorrect) {
      record.bestCorrect = state.correct;
    }
    record.badge = record.bestScore >= 60;
    progress.lastBatting = {
      course: state.course,
      result: state.batting.result,
      score: state.batting.score,
      savedAt: new Date().toISOString()
    };
    saveProgress();

    state.lastResult = {
      quizScore,
      battingScore: state.batting.score,
      battingResult: state.batting.result,
      totalScore,
      rank: getRank(totalScore),
      wrongAnswers: state.answers.filter(answer => !answer.isCorrect)
    };
  }

  function createFireParticles() {
    const container = document.getElementById('fireParticles');
    if (!container) return;
    for (let i = 0; i < 18; i += 1) {
      const particle = document.createElement('i');
      particle.textContent = i % 3 === 0 ? '✨' : '🔥';
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.fontSize = `${18 + Math.random() * 22}px`;
      particle.style.animationDelay = `${Math.random() * .25}s`;
      container.appendChild(particle);
    }
  }

    }[result.battingResult] || '';

    app.innerHTML = `
      <section class="screen-card">
        <header class="screen-head">

          <div class="screen-sub">${esc(course.title)}</div>

        <div class="result-card">

            <div>

            <div class="score-row"><span>打撃結果</span><strong>${esc(battingText)}</strong></div>
            <div class="score-row"><span>打撃得点</span><strong>${result.battingScore} / 10</strong></div>

          <div class="button-row">

          </div>
          <button class="primary-cta" data-action="home" type="button">トップへ戻る</button>
        </div>

  function showToast(message) {
    const old = document.querySelector('.toast');
    old?.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1800);
  }

  function playTone(type) {
    if (!progress.sound) return;
    try {
      audioContext ||= new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime;
      const config = {
        correct: [660, .12], wrong: [190, .16], pitch: [330, .08], hit: [520, .13], homerun: [880, .28]
      }[type] || [440, .1];
      osc.frequency.setValueAtTime(config[0], now);
      if (type === 'homerun') osc.frequency.exponentialRampToValueAtTime(1320, now + config[1]);
      gain.gain.setValueAtTime(.0001, now);
      gain.gain.exponentialRampToValueAtTime(.13, now + .02);
      gain.gain.exponentialRampToValueAtTime(.0001, now + config[1]);
      osc.connect(gain).connect(audioContext.destination);
      osc.start(now);
      osc.stop(now + config[1] + .03);
    } catch (error) {
      console.warn('効果音を再生できませんでした。', error);
    }
  }

  app.addEventListener('click', event => {
    const button = event.target.closest('[data-action]');
    if (!button || button.disabled) return;
    const action = button.dataset.action;
    if (action === 'show-courses') {
      document.getElementById('courseGrid')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else if (action === 'start-course') {
      startCourse(button.dataset.course);
    } else if (action === 'answer') {
      answerQuestion(Number(button.dataset.index));
    } else if (action === 'next-question') {
      nextQuestion();
    } else if (action === 'start-pitch') {
      startPitch();
    } else if (action === 'swing') {
      swingBat();
    } else if (action === 'show-result') {
      renderResult();
    } else if (action === 'review') {
      renderReview();
    } else if (action === 'retry') {
      startCourse(state.course);
    } else if (action === 'back-result') {
      renderResult();
    } else if (action === 'home') {
      renderHome();
    }
  });

  homeButton.addEventListener('click', () => {
    if (state.view === 'quiz' && state.index > 0 && !window.confirm('クイズを途中で終了してトップへ戻りますか？')) return;
    if (state.batting?.rafId) cancelAnimationFrame(state.batting.rafId);
    renderHome();
  });

  soundButton.addEventListener('click', () => {
    progress.sound = !progress.sound;
    soundButton.textContent = progress.sound ? '🔊' : '🔇';
    soundButton.setAttribute('aria-pressed', String(progress.sound));
    saveProgress();
    showToast(progress.sound ? '効果音をオンにしました' : '効果音をオフにしました');
    if (progress.sound) playTone('correct');
  });

  window.addEventListener('error', event => {
    console.error('ゲーム内エラー:', event.error || event.message);
  });

  soundButton.textContent = progress.sound ? '🔊' : '🔇';
  soundButton.setAttribute('aria-pressed', String(progress.sound));
  renderHome();
})();

</script>
</body>
</html>
