<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETRO BOMBER 2D</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: 'monospace', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #0d140d;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 70vh;
            image-rendering: pixelated;
            background-color: #2e4d2e;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 4px solid #4a6b4a;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 8px 24px;
            border-radius: 4px;
            border: 2px solid #ffff00;
            text-shadow: 2px 2px 0px #000;
            letter-spacing: 2px;
            display: flex;
            gap: 20px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            height: 160px;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute;
            bottom: 10px;
            left: 40px;
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: #ff0055;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 4px 0px #990033;
        }
        #action-btn {
            position: absolute;
            bottom: 20px;
            right: 40px;
            width: 90px;
            height: 90px;
            background: #00ccff;
            border: 4px solid #fff;
            border-radius: 50%;
            box-shadow: 0 6px 0px #0088cc;
            pointer-events: auto;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 0px #000;
        }
        #action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #0088cc;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 20;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff0033;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: #ffff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ui-layer">
        <div id="hud">
            <div>SCORE:<span id="score-val">0</span></div>
            <div>LIFE:<span id="life-val">3</span></div>
        </div>
        <div id="controls">
            <div id="joystick-zone"><div id="joystick-knob"></div></div>
            <div id="action-btn">BOMB</div>
        </div>
    </div>

    <div id="game-over">
        <div>GAME OVER</div>
        <button id="restart-btn" onclick="resetGame()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRID_SIZE = 13; 
        const TILE_SIZE = 32; 
        canvas.width = GRID_SIZE * TILE_SIZE;
        canvas.height = GRID_SIZE * TILE_SIZE;

        let MAP = [];
        let player = { x: 0, y: 0, radius: 12, speed: 2.5, vx: 0, vy: 0, lives: 3, score: 0 };
        let enemies = [];
        let bombs = [];
        let explosions = [];
        let particles = [];

        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        const joystickMaxDist = 40;
        const knob = document.getElementById('joystick-knob');

        initGame();

        function initGame() {
            MAP = []; enemies = []; bombs = []; explosions = []; particles = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                MAP[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (r === 0 || r === GRID_SIZE - 1 || c === 0 || c === GRID_SIZE - 1 || (r % 2 === 0 && c % 2 === 0)) {
                        MAP[r][c] = 1; 
                    } else {
                        MAP[r][c] = ((r <= 2 && c === 1) || (r === 1 && c <= 2)) ? 0 : (Math.random() < 0.4 ? 2 : 0);
                    }
                }
            }

            let spawnPositions = [{r: GRID_SIZE-2, c: GRID_SIZE-2}, {r: 1, c: GRID_SIZE-2}, {r: GRID_SIZE-2, c: 1}];
            spawnPositions.forEach((pos, idx) => {
                enemies.push({
                    x: pos.c * TILE_SIZE + TILE_SIZE/2, y: pos.r * TILE_SIZE + TILE_SIZE/2,
                    radius: 12, speed: 1.2, dir: Math.floor(Math.random() * 4),
                    color: idx === 0 ? '#ff4400' : '#ff8800', changeDirTimer: 0
                });
            });

            player.x = TILE_SIZE + TILE_SIZE/2; player.y = TILE_SIZE + TILE_SIZE/2;
            player.vx = 0; player.vy = 0;
            document.getElementById('game-over').style.display = 'none';
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('score-val').innerText = player.score;
            document.getElementById('life-val').innerText = player.lives;
        }

        setupControls();

        function setupControls() {
            const zone = document.getElementById('joystick-zone');
            const actionBtn = document.getElementById('action-btn');

            const handleStart = (clientX, clientY) => { joystickActive = true; joystickStart = { x: clientX, y: clientY }; };
            const handleMove = (clientX, clientY) => {
                if (!joystickActive) return;
                let dx = clientX - joystickStart.x; let dy = clientY - joystickStart.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > joystickMaxDist) { dx = (dx / dist) * joystickMaxDist; dy = (dy / dist) * joystickMaxDist; }
                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                player.vx = (dx / joystickMaxDist) * player.speed; player.vy = (dy / joystickMaxDist) * player.speed;
            };
            const handleEnd = () => { joystickActive = false; knob.style.transform = 'translate(0px, 0px)'; player.vx = 0; player.vy = 0; };

            zone.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
            window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
            window.addEventListener('touchend', handleEnd, {passive:true});
            zone.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
            window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', handleEnd);

            actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); deployBomb(); });
            actionBtn.addEventListener('mousedown', () => deployBomb());

            window.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'f') deployBomb();
                if (e.key === 'ArrowUp' || e.key === 'w') player.vy = -player.speed;
                if (e.key === 'ArrowDown' || e.key === 's') player.vy = player.speed;
                if (e.key === 'ArrowLeft' || e.key === 'a') player.vx = -player.speed;
                if (e.key === 'ArrowRight' || e.key === 'd') player.vx = player.speed;
            });
            window.addEventListener('keyup', (e) => {
                if (['ArrowUp', 'w', 'ArrowDown', 's'].includes(e.key)) player.vy = 0;
                if (['ArrowLeft', 'a', 'ArrowRight', 'd'].includes(e.key)) player.vx = 0;
            });
        }

        function deployBomb() {
            const c = Math.floor(player.x / TILE_SIZE); const r = Math.floor(player.y / TILE_SIZE);
            if (bombs.some(b => b.r === r && b.c === c)) return;
            bombs.push({ r: r, c: c, timer: 120, pulse: 0 });
        }

        function checkTileCollision(x, y, radius) {
            const minC = Math.floor((x - radius) / TILE_SIZE); const maxC = Math.floor((x + radius) / TILE_SIZE);
            const minR = Math.floor((y - radius) / TILE_SIZE); const maxR = Math.floor((y + radius) / TILE_SIZE);
            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    if (r < 0 || r >= GRID_SIZE || c < 0 || c >= GRID_SIZE) return true;
                    if (MAP[r][c] !== 0) {
                        if (x + radius > c * TILE_SIZE && x - radius < c * TILE_SIZE + TILE_SIZE &&
                            y + radius > r * TILE_SIZE && y - radius < r * TILE_SIZE + TILE_SIZE) return true;
                    }
                }
            }
            return false;
        }

        function updateEnemies() {
            enemies.forEach(enemy => {
                enemy.changeDirTimer--;
                let nextX = enemy.x; let nextY = enemy.y;
                if (enemy.dir === 0) nextY -= enemy.speed; if (enemy.dir === 1) nextY += enemy.speed;
                if (enemy.dir === 2) nextX -= enemy.speed; if (enemy.dir === 3) nextX += enemy.speed;

                if (!checkTileCollision(nextX, nextY, enemy.radius) && enemy.changeDirTimer > 0) {
                    enemy.x = nextX; enemy.y = nextY;
                } else {
                    enemy.dir = Math.floor(Math.random() * 4);
                    enemy.changeDirTimer = Math.floor(Math.random() * 60) + 30;
                }
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius) playerHit();
            });
        }

        function playerHit() {
            player.lives--; updateHUD();
            if (player.lives <= 0) document.getElementById('game-over').style.display = 'flex';
            else { player.x = TILE_SIZE + TILE_SIZE/2; player.y = TILE_SIZE + TILE_SIZE/2; }
        }

        function resetGame() { player.lives = 3; player.score = 0; initGame(); }

        function updateBombs() {
            for (let i = bombs.length - 1; i >= 0; i--) {
                bombs[i].timer--; bombs[i].pulse += 0.1;
                if (bombs[i].timer <= 0) { explode(bombs[i].r, bombs[i].c); bombs.splice(i, 1); }
            }
            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].life--; if (explosions[i].life <= 0) explosions.splice(i, 1);
            }
        }

        function explode(centerR, centerC) {
            const range = 2; const directions = [{r:0, c:0}, {r:-1, c:0}, {r:1, c:0}, {r:0, c:-1}, {r:0, c:1}];
            directions.forEach(dir => {
                for (let i = (dir.r === 0 && dir.c === 0 ? 0 : 1); i <= range; i++) {
                    const targetR = centerR + dir.r * i; const targetC = centerC + dir.c * i;
                    if (targetR < 0 || targetR >= GRID_SIZE || targetC < 0 || targetC >= GRID_SIZE || MAP[targetR][targetC] === 1) break;
                    
                    explosions.push({ r: targetR, c: targetC, life: 15 });
                    if (Math.floor(player.y / TILE_SIZE) === targetR && Math.floor(player.x / TILE_SIZE) === targetC) playerHit();

                    for (let e = enemies.length - 1; e >= 0; e--) {
                        if (Math.floor(enemies[e].y / TILE_SIZE) === targetR && Math.floor(enemies[e].x / TILE_SIZE) === targetC) {
                            createParticles(enemies[e].x, enemies[e].y, '#ff0033');
                            enemies.splice(e, 1); player.score += 200; updateHUD();
                        }
                    }
                    if (MAP[targetR][targetC] === 2) {
                        MAP[targetR][targetC] = 0;
                        createParticles(targetC * TILE_SIZE + TILE_SIZE/2, targetR * TILE_SIZE + TILE_SIZE/2, '#aa6633');
                        player.score += 50; updateHUD(); break;
                    }
                }
            });
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, life: 20, color: color });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life--;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function loop() {
            if (player.lives > 0) {
                if (!checkTileCollision(player.x + player.vx, player.y, player.radius)) player.x += player.vx;
                if (!checkTileCollision(player.x, player.y + player.vy, player.radius)) player.y += player.vy;
            }
            updateEnemies(); updateBombs(); updateParticles();

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (MAP[r][c] === 1) {
                        ctx.fillStyle = '#555555'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.strokeStyle = '#333333'; ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (MAP[r][c] === 2) {
                        ctx.fillStyle = '#aa6633'; ctx.fillRect(c * TILE_SIZE + 2, r * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    } else {
                        ctx.fillStyle = '#223e22'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            bombs.forEach(b => {
                ctx.fillStyle = '#111111'; ctx.beginPath();
                ctx.arc(b.c * TILE_SIZE + TILE_SIZE/2, b.r * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/2.5 + Math.sin(b.pulse)*2, 0, Math.PI*2);
                ctx.fill();
            });

            explosions.forEach(e => {
                ctx.fillStyle = Math.random() > 0.5 ? '#ffcc00' : '#ff3300';
                ctx.fillRect(e.c * TILE_SIZE, e.r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            });

            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color; ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.fillRect(enemy.x - 5, enemy.y - 4, 3, 3); ctx.fillRect(enemy.x + 2, enemy.y - 4, 3, 3);
            });

            if (player.lives > 0) {
                ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.fillRect(player.x - 7, player.y - 5, 14, 4);
            }

            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 3, 3); });
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
