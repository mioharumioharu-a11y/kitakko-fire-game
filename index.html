<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-BIT FIRE PREVENTION QUIZ</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 10px;
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #000;
            display: block;
            width: 384px;
            height: 360px;
            image-rendering: pixelated;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        /* コントローラー（4択ボタン） */
        #controller {
            width: 384px;
            margin-top: 10px;
            background: #222;
            border: 2px solid #555;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        .ctrl-btn {
            background: #444;
            color: #fff;
            border: 2px solid #aaa;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            line-height: 1.4;
        }
        .ctrl-btn:active {
            background: #ff0;
            color: #000;
        }
        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 376px;
            height: 352px;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .overlay h1 { color: #ff3300; font-size: 24px; margin-bottom: 20px; letter-spacing: 2px; }
        .overlay p { margin-bottom: 15px; font-size: 14px; line-height: 1.6; }
        .overlay button {
            background: #ff3300; color: #fff; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
            border: 2px solid #fff;
        }
        .overlay button:active { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- キャンバス -->
        <canvas id="gameCanvas"></canvas>

        <!-- スタート画面 -->
        <div id="start-overlay" class="overlay">
            <h1>火災予防 QUIZ</h1>
            <p>全5問の4択クイズに挑戦！<br>目指せ、火災予防マスター！</p>
            <button onclick="startGame()">START GAME</button>
        </div>

        <!-- リザルト画面 -->
        <div id="result-overlay" class="overlay" style="display:none;">
            <h1 id="result-title">結果発表</h1>
            <p id="result-score">0 / 5 正解</p>
            <p id="result-comment"></p>
            <button onclick="location.reload()">もう一度挑戦</button>
        </div>

        <!-- 操作パネル（選択肢） -->
        <div id="controller">
            <button class="ctrl-btn" id="btn-0" onclick="selectAnswer(1)">1. </button>
            <button class="ctrl-btn" id="btn-1" onclick="selectAnswer(2)">2. </button>
            <button class="ctrl-btn" id="btn-2" onclick="selectAnswer(3)">3. </button>
            <button class="ctrl-btn" id="btn-3" onclick="selectAnswer(4)">4. </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- クイズデータ ---
        const quizData = [
            {
                q: "コンロで揚げ物中に急な来客！\nどうするのが一番正しい？",
                opts: ["弱火にしてから離れる", "数十秒ならそのまま急いで戻る", "必ず完全に消火してから離れる", "鍋にフタをしてから離れる"],
                ans: 3,
                desc: "油は約360℃以上で火がなくても自然発火します。短時間でも必ず消火！"
            },
            {
                q: "コンセントのホコリと湿気で\n突然発火する現象の名前は？",
                opts: ["スパーク現象", "トラッキング現象", "ショート現象", "オーバーロード現象"],
                ans: 2,
                desc: "プラグを挿しっぱなしの場所に溜まるホコリが原因。定期的に掃除を！"
            },
            {
                q: "住宅用火災警報器の交換目安は\n一般的に何年とされている？",
                opts: ["約3年", "約5年", "約10年", "約20年"],
                ans: 3,
                desc: "電子部品の寿命や電池切れを防ぐため、10年での本体交換が推奨されます。"
            },
            {
                q: "消火器を使うとき、レバーを\n握る前に最初に行う動作は？",
                opts: ["本体を逆さまにする", "黄色い安全ピンを引き抜く", "ホースを力いっぱい引っ張る", "本体を強く揺らす"],
                ans: 2,
                desc: "「ピン・ポン・パン」の順！まずは黄色の安全ピンを抜かないと動きません。"
            },
            {
                q: "自力での初期消火を諦めて\n避難すべき限界の基準はどれ？",
                opts: ["煙が部屋に充満したとき", "炎が自分の背丈を超えたとき", "炎が天井に届いたとき", "消火器の薬剤が切れたとき"],
                ans: 3,
                desc: "火が天井に届くと一気に拡大します。迷わず大声で知らせて避難して！"
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let gameState = 'START'; // START, QUESTION, JUDGE, END
        let isCorrect = false;
        let showDesc = false;

        // --- Web Audio API (ピコピコ効果音) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'select') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, now);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now); // ド
                osc.frequency.setValueAtTime(659.25, now + 0.1); // ミ
                osc.frequency.setValueAtTime(783.99, now + 0.2); // ソ
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.3);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            currentIdx = 0;
            score = 0;
            loadQuestion();
            gameState = 'QUESTION';
            animate();
        }

        function loadQuestion() {
            showDesc = false;
            gameState = 'QUESTION';
            const q = quizData[currentIdx];
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn-${i}`).innerText = `${i+1}. ${q.opts[i]}`;
                document.getElementById(`btn-${i}`).style.pointerEvents = "auto";
                document.getElementById(`btn-${i}`).style.opacity = "1";
            }
        }

        function selectAnswer(userAns) {
            if (gameState !== 'QUESTION') return;
            
            const q = quizData[currentIdx];
            isCorrect = (userAns === q.ans);
            if (isCorrect) {
                score++;
                playSound('correct');
            } else {
                playSound('wrong');
            }

            gameState = 'JUDGE';
            showDesc = true;

            // ボタンを一時無効化
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn-${i}`).style.pointerEvents = "none";
                if (i !== q.ans - 1) {
                    document.getElementById(`btn-${i}`).style.opacity = "0.4";
                }
            }

            // 画面クリック/タップで次へ進むための判定用
            setTimeout(() => {
                canvas.addEventListener('click', nextStep, { once: true });
            }, 500);
        }

        function nextStep() {
            playSound('select');
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            gameState = 'END';
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('result-score').innerText = `${quizData.length}問中 ${score}問 正解！`;
            
            let comment = "";
            if (score === 5) comment = "素晴らしい！完璧な防災知識です！";
            else if (score >= 3) comment = "お見事！日頃の意識の高さが伺えます。";
            else comment = "もう一度復習して、火の用心を徹底しましょう！";
            document.getElementById('result-comment').innerText = comment;
        }

        // --- 描画処理 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景グラデーション風（レトロダークグリーン）
            ctx.fillStyle = '#004411';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ヘッダー枠
            ctx.fillStyle = '#000';
            ctx.fillRect(5, 5, canvas.width - 10, 40);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(5, 5, canvas.width - 10, 40);

            ctx.fillStyle = '#ff0';
            ctx.font = 'bold 14px "Courier New", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`第 ${currentIdx + 1} 問 / 全 ${quizData.length} 問`, 15, 29);

            // 問題文表示エリア
            ctx.fillStyle = '#000';
            ctx.fillRect(5, 50, canvas.width - 10, 100);
            ctx.strokeRect(5, 50, canvas.width - 10, 100);

            ctx.fillStyle = '#fff';
            ctx.font = '12px "Courier New", sans-serif';
            const lines = quizData[currentIdx].q.split('\n');
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], 15, 80 + (i * 22));
            }

            // マスコット（簡易ドット消防車・消火栓風のレトロアートオブジェクト）
            drawMascot();

            // 解説・判定エリア
            if (showDesc) {
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(5, 160, canvas.width - 10, 195);
                ctx.strokeRect(5, 160, canvas.width - 10, 195);

                // まる・ばつ判定
                ctx.font = 'bold 24px "Courier New"';
                ctx.textAlign = 'center';
                if (isCorrect) {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillText('【 正 解 】', canvas.width / 2, 195);
                } else {
                    ctx.fillStyle = '#ff3300';
                    ctx.fillText('【 不正解 】', canvas.width / 2, 195);
                }

                // 解説文（自動折り返し簡易実装）
                ctx.fillStyle = '#fff';
                ctx.font = '11px "Courier New", sans-serif';
                ctx.textAlign = 'left';
                const desc = quizData[currentIdx].desc;
                const descLines = [];
                for (let i = 0; i < desc.length; i += 15) {
                    descLines.push(desc.substring(i, i + 15));
                }
                for (let i = 0; i < descLines.length; i++) {
                    ctx.fillText(descLines[i], 20, 230 + (i * 18));
                }

                ctx.fillStyle = '#ff0';
                ctx.font = '10px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('▼ 画面をタッチして次の問題へ', canvas.width / 2, 340);
            }
        }

        function drawMascot() {
            // レトロな消火栓風ドット絵オブジェクトをCanvas上に描画
            const cx = 310;
            const cy = 90;
            ctx.fillStyle = '#ff3300'; // 赤
            ctx.fillRect(cx, cy, 24, 36);
            ctx.fillStyle = '#fff';    // 帽子・キャップ
            ctx.fillRect(cx - 2, cy + 4, 28, 6);
            ctx.fillRect(cx + 6, cy - 4, 12, 4);
            ctx.fillStyle = '#ff0';    // ライト・目
            ctx.fillRect(cx + 4, cy + 14, 4, 4);
            ctx.fillRect(cx + 16, cy + 14, 4, 4);
        }

        function animate() {
            if (gameState === 'END') return;
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
