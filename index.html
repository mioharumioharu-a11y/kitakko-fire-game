<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>火災予防クイズ</title>

<style>
*{
  box-sizing:border-box
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(#fff2e8,#eef3f8);
  color:#172236
}

button,input{
  font:inherit
}

.s{
  display:none;
  min-height:100vh;
  padding:18px 14px 40px
}

.s.on{
  display:block
}

.w{
  max-width:720px;
  margin:auto
}

.hero{
  background:linear-gradient(145deg,#c51f24,#751014);
  color:#fff;
  border-radius:28px;
  padding:28px 18px;
  text-align:center;
  box-shadow:0 18px 40px #8a1b2235
}

h1{
  font-size:clamp(32px,9vw,52px);
  line-height:1.05;
  margin:7px 0
}

.fire{
  font-size:72px
}

.card{
  background:#fff;
  border-radius:21px;
  padding:19px;
  margin-top:15px;
  box-shadow:0 8px 28px #13213b15;
  border:1px solid #e7eaf0
}

input{
  width:100%;
  padding:15px;
  border:2px solid #dfe3ea;
  border-radius:14px;
  font-size:17px
}

.btn{
  width:100%;
  border:0;
  border-radius:15px;
  padding:16px;
  margin-top:12px;
  font-weight:900;
  font-size:18px
}

.pri{
  background:linear-gradient(90deg,#c51f24,#f06b2d);
  color:#fff
}

.sec{
  background:#e9eef5;
  color:#172236
}

.feat{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:15px
}

.feat div{
  background:#fff2e7;
  padding:11px 5px;
  border-radius:13px;
  text-align:center;
  font-size:12px;
  font-weight:800
}

.top{
  position:sticky;
  top:0;
  padding:8px 0;
  background:#f4f7fbe9;
  backdrop-filter:blur(8px);
  z-index:5
}

.pt{
  display:flex;
  justify-content:space-between;
  font-weight:900;
  font-size:13px
}

.bar{
  height:11px;
  background:#dce2eb;
  border-radius:99px;
  overflow:hidden;
  margin-top:7px
}

.bar i{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,#f7b02d,#cb2025);
  transition:.3s
}

.qn{
  color:#ba2024;
  font-weight:950
}

.q{
  font-size:clamp(21px,5vw,28px);
  font-weight:950;
  line-height:1.45;
  margin:10px 0 17px
}

.choices{
  display:grid;
  gap:10px
}

.choice{
  display:flex;
  gap:10px;
  text-align:left;
  padding:15px;
  border:2px solid #e0e5ed;
  background:#fff;
  border-radius:16px;
  font-weight:850;
  line-height:1.45
}

.choice span{
  flex:0 0 29px;
  height:29px;
  border-radius:50%;
  background:#edf1f7;
  display:grid;
  place-items:center
}

.choice.ok{
  border-color:#16944a;
  background:#edfff3
}

.choice.ok span{
  background:#16944a;
  color:#fff
}

.choice.ng{
  border-color:#d52a2f;
  background:#fff0f0
}

.choice.ng span{
  background:#d52a2f;
  color:#fff
}

.choice.off{
  pointer-events:none
}

.fb{
  display:none;
  margin-top:15px;
  padding:16px;
  border-radius:18px;
  line-height:1.65
}

.fb.on{
  display:block
}

.fb.good{
  background:#eafbf0;
  border:2px solid #58b979
}

.fb.bad{
  background:#fff0ed;
  border:2px solid #ed7866
}

.fbt{
  font-size:20px;
  font-weight:950
}

.basis{
  background:#fff;
  padding:11px;
  border-radius:12px;
  margin-top:10px;
  font-size:13px
}

.result{
  background:linear-gradient(145deg,#1c2b44,#08101d);
  color:#fff;
  border-radius:28px;
  text-align:center;
  padding:25px
}

.score{
  font-size:72px;
  color:#f6ca47;
  font-weight:1000;
  line-height:1
}

.rank{
  font-size:25px;
  font-weight:950
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:13px
}

.stat{
  background:#fff;
  border-radius:16px;
  padding:15px;
  text-align:center
}

.stat b{
  display:block;
  color:#c51f24;
  font-size:25px
}

.review{
  border-left:6px solid #ccc
}

.review.ok{
  border-left-color:#159447
}

.review.ng{
  border-left-color:#d52a2f
}

a{
  color:#a7191e
}

@media(max-width:430px){
  .feat{
    grid-template-columns:1fr
  }
}
</style>
</head>

<body>

<section id="start" class="s on">
  <div class="w">

    <div class="hero">
      <div class="fire">🔥🏠</div>
      <h1>火災予防<br>クイズゲーム</h1>
      <b>学んで守ろう！わが家と大切な命</b>
    </div>

    <div class="card">
      <b>挑戦者の名前</b>

      <input
        id="name"
        maxlength="20"
        placeholder="名前を入力してください"
      >

      <button id="go" class="btn pri">
        クイズに挑戦する
      </button>

      <div class="feat">
        <div>
          📚 全30問から<br>10問出題
        </div>

        <div>
          💡 全問に<br>解説付き
        </div>

        <div>
          🔎 公的資料の<br>根拠付き
        </div>
      </div>
    </div>

    <div class="card">
      住宅用火災警報器、こんろ、電気、たばこ、ストーブ、
      放火対策、避難、消火器などを4択で学べます。
    </div>

  </div>
</section>

<section id="quiz" class="s">
  <div class="w">

    <div class="top">
      <div class="pt">
        <span id="pl"></span>
        <span id="pg"></span>
      </div>

      <div class="bar">
        <i id="bar"></i>
      </div>
    </div>

    <div class="card">
      <div id="qn" class="qn"></div>
      <div id="qt" class="q"></div>

      <div id="cs" class="choices"></div>

      <div id="fb" class="fb">
        <div id="fbt" class="fbt"></div>
        <div id="ex"></div>

        <div class="basis">
          根拠：
          <a id="src" target="_blank" rel="noopener"></a>
        </div>
      </div>

      <button
        id="next"
        class="btn pri"
        style="display:none"
      >
        次の問題へ
      </button>
    </div>

    <button id="quit" class="btn sec">
      はじめに戻る
    </button>

  </div>
</section>

<section id="result" class="s">
  <div class="w">

    <div class="result">
      <div id="ico" style="font-size:48px">🏆</div>

      <div id="rn"></div>

      <div class="score">
        <span id="sc">0</span>
        <small style="font-size:24px">点</small>
      </div>

      <div id="rk" class="rank"></div>
      <div id="msg"></div>
    </div>

    <div class="grid">
      <div class="stat">
        <b id="cn"></b>
        正解数
      </div>

      <div class="stat">
        <b id="best"></b>
        最高得点
      </div>
    </div>

    <button id="retry" class="btn pri">
      もう一度挑戦する
    </button>

    <button id="home" class="btn sec">
      トップに戻る
    </button>

    <h2>回答の振り返り</h2>

    <div id="reviews"></div>

  </div>
</section>

<script>
const Q = [
  {

  },
  {
    q:"住宅用火災警報器の最も大きな役割はどれですか。",
    c:[
      "火災を自動で消す",

      "消防車を自動で呼ぶ",

    a:1,
    e:"煙や熱を感知して警報を鳴らし、早期発見と避難につなげる機器です。",
    b:"消防庁「住宅用火災警報器を設置しましょう！」",
    u:"https://www.fdma.go.jp/relocation/html/life/juukei.html"

  {

    u:"https://www.fdma.go.jp/relocation/e-college/cat67/cat49/cat43/1-14.html"
  },
  {

    b:"消防庁「住宅防火 いのちを守る10のポイント」",
    u:"https://www.fdma.go.jp/publication/movie/juutaku_bouka/10.html"
  },
  {
    q:"ガスこんろの周囲で最も安全な状態はどれですか。",

      "カーテンを近づける"
    ],
    a:2,
    e:"こんろの周囲に紙、布、油、スプレー缶などを置くと、着火や破裂の危険があります。",

  },

    ],
    a:2,
    e:"異常な発熱、膨張、異臭は故障や発火の兆候です。使用・充電を中止して販売店やメーカーに相談します。",

    u:"https://www.fdma.go.jp/publication/ugoki/items/rei_0608_25.pdf"
  },
  {
    q:"ストーブの近くに置いてはいけないものはどれですか。",
    c:[
      "不燃性の壁",
      "カーテンや洗濯物",
      "安全な空間",
      "適切な防護柵"
    ],
    a:1,
    e:"カーテンや洗濯物などの可燃物は、接触や放射熱で燃える危険があります。",

  },
  {
    q:"石油ストーブへの給油で正しい方法はどれですか。",

    ],
    a:2,

  {

const N = 10;

const $ = id => document.getElementById(id);

let list = [];
let i = 0;
let correct = 0;
let ans = [];
let player = "";

function show(id){
  document
    .querySelectorAll(".s")
    .forEach(element => element.classList.remove("on"));

  $(id).classList.add("on");

  window.scrollTo(0,0);
}

function shuffle(array){
  const copied = [...array];

  for(let index = copied.length - 1; index > 0; index--){
    const randomIndex = Math.floor(
      Math.random() * (index + 1)
    );

    [
      copied[index],
      copied[randomIndex]
    ] = [
      copied[randomIndex],
      copied[index]
    ];
  }

  return copied;
}

function start(){
  player = $("name").value.trim() || "チャレンジャー";

  list = shuffle(Q).slice(0,N);

  i = 0;
  correct = 0;
  ans = [];

  $("pl").textContent = player + "さん";

  show("quiz");
  render();
}

function render(){
  const question = list[i];

  $("pg").textContent = `${i + 1} / ${N}`;

  $("bar").style.width =
    (i / N * 100) + "%";

  $("qn").textContent =
    `第${i + 1}問`;

  $("qt").textContent =
    question.q;

  $("fb").className = "fb";

  $("next").style.display = "none";

  $("cs").innerHTML = "";

  question.c.forEach((text,index) => {
    const button = document.createElement("button");

    button.className = "choice";

    const alphabet = ["A","B","C","D"][index];

    button.innerHTML = `
      <span>${alphabet}</span>
      <div>${text}</div>
    `;

    button.onclick = () => answer(index);

    $("cs").appendChild(button);
  });
}

function answer(selectedIndex){
  const question = list[i];

  const isCorrect =
    selectedIndex === question.a;

  if(isCorrect){
    correct++;
  }

  ans.push({
    q:question,
    x:selectedIndex,
    ok:isCorrect
  });

  [...$("cs").children].forEach(
    (button,index) => {

      button.classList.add("off");

      if(index === question.a){
        button.classList.add("ok");
      }
      else if(index === selectedIndex){
        button.classList.add("ng");
      }
    }
  );

  $("fb").className =
    "fb on " +
    (isCorrect ? "good" : "bad");

  $("fbt").textContent =
    isCorrect
      ? "正解！ ✅"
      : "不正解… 正解は「" +
        question.c[question.a] +
        "」";

  $("ex").textContent =
    question.e;

  $("src").textContent =
    question.b;

  $("src").href =
    question.u;

  $("next").style.display =
    "block";

  $("next").textContent =
    i === N - 1
      ? "結果を見る"
      : "次の問題へ";

  setTimeout(() => {
    $("fb").scrollIntoView({
      behavior:"smooth",
      block:"center"
    });
  },100);
}

function finish(){
  const score = correct * 10;

  const oldBest =
    Number(
      localStorage.getItem("fireQuizBest") || 0
    );

  const bestScore =
    Math.max(score,oldBest);

  localStorage.setItem(
    "fireQuizBest",
    bestScore
  );

  let rank;
  let message;
  let icon;

  if(score === 100){
    rank = "火災予防マスター";
    message =
      "全問正解！火災予防の知識は完璧です。";
    icon = "👑";
  }
  else if(score >= 80){
    rank = "火災予防リーダー";
    message =
      "すばらしい成績です。家族にも伝えましょう。";
    icon = "🏆";
  }
  else if(score >= 60){
    rank = "火災予防隊員";
    message =
      "合格ラインです。間違えた問題を復習しましょう。";
    icon = "🚒";
  }
  else if(score >= 40){
    rank = "見習い予防隊員";
    message =
      "もう一度挑戦して知識を身につけましょう。";
    icon = "🧯";
  }
  else{
    rank = "火災予防チャレンジャー";
    message =
      "解説を確認し、命を守る行動を覚えましょう。";
    icon = "🔥";
  }

  $("ico").textContent = icon;

  $("rn").textContent =
    player + "さんの結果";

  $("sc").textContent = score;

  $("cn").textContent =
    correct + " / " + N;

  $("best").textContent =
    bestScore + "点";

  $("rk").textContent =
    rank;

  $("msg").textContent =
    message;

  $("reviews").innerHTML = "";

  ans.forEach((answerData,index) => {
    const div =
      document.createElement("div");

    div.className =
      "card review " +
      (answerData.ok ? "ok" : "ng");

    div.innerHTML = `
      <b>
        ${index + 1}．${answerData.q.q}
      </b>

      <p>
        ${answerData.ok ? "✅ 正解" : "❌ 不正解"}
        <br>
        正解：${answerData.q.c[answerData.q.a]}
        <br>
        ${answerData.q.e}
      </p>

      <a
        href="${answerData.q.u}"
        target="_blank"
        rel="noopener"
      >
        根拠：${answerData.q.b}
      </a>
    `;

    $("reviews").appendChild(div);
  });

  show("result");
}

$("go").onclick = start;

$("next").onclick = () => {
  i++;

  if(i >= N){
    finish();
  }
  else{
    render();
    window.scrollTo(0,0);
  }
};

$("retry").onclick = start;

$("home").onclick = () => {
  show("start");
};

$("quit").onclick = () => {
  const result =
    confirm(
      "クイズを終了して、はじめに戻りますか？"
    );

  if(result){
    show("start");
  }
};

$("name").onkeydown = event => {
  if(event.key === "Enter"){
    start();
  }
};
