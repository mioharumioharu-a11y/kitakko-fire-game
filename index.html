<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トライくんの予防救急マスターへの道</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a2238;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 10px;
        }
        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background-color: #0d1b2a;
            display: block;
            width: 384px;
            height: 380px;
            border: 4px solid #f1c40f;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #controller {
            width: 384px;
            margin-top: 12px;
            background: #1b263b;
            border: 2px solid #415a77;
            border-radius: 8px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .ctrl-btn {
            background: #415a77;
            color: #fff;
            border: none;
            border-bottom: 4px solid #0d1b2a;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
            line-height: 1.4;
            transition: transform 0.1s;
        }
        .ctrl-btn:active {
            transform: scale(0.98);
            background: #e0a800;
        }
        .overlay {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 376px;
            height: 372px;
            background: rgba(13, 27, 42, 0.95);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .overlay h1 { color: #f1c40f; font-size: 22px; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .overlay p { margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
        .overlay button {
            background: #e63946; color: #fff; border: none; padding: 12px 24px;
            font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4);
        }
        .overlay button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <div id="start-overlay" class="overlay">
            <h1>トライくんの<br>予防救急マスターへの道</h1>
            <p>クイズに正解してトライくんを<br>「救急隊員」から最高位の<br>「予防救急マスター」へランクアップさせよう！</p>
            <button onclick="startGame()">訓練開始！</button>
        </div>

        <div id="result-overlay" class="overlay" style="display:none;">
            <h1 id="result-title">最終評価</h1>
            <p id="result-score">0 / 5 正解</p>
            <p id="result-rank" style="font-size:18px; color:#f1c40f; font-weight:bold; margin-bottom:10px;"></p>
            <p id="result-comment"></p>
            <button onclick="location.reload()">再挑戦する</button>
        </div>

        <div id="controller">
            <button class="ctrl-btn" id="btn-0" onclick="selectAnswer(1)">1. </button>
            <button class="ctrl-btn" id="btn-1" onclick="selectAnswer(2)">2. </button>
            <button class="ctrl-btn" id="btn-2" onclick="selectAnswer(3)">3. </button>
            <button class="ctrl-btn" id="btn-3" onclick="selectAnswer(4)">4. </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ランクネームとカラー定義
        const RANKS = [
            { name: "一般市民", color: "#a8dadc" },
            { name: "救急隊員", color: "#457b9d" },
            { name: "上級救急隊員", color: "#1d3557" },
            { name: "指導救命士", color: "#e63946" },
            { name: "予防救急マスター", color: "#f1c40f" }
        ];

        const quizData = [
            {
                q: "【救急】熱中症が疑われる人を発見！\n意識がある場合、まず行うべきは？",
                opts: ["冷たい水分・塩分を補給させる", "無理やり歩かせて病院に連れて行く", "厚着をさせて汗をかかせる", "すぐに心臓マッサージを行う"],
                ans: 1,
                desc: "意識があるなら自力での水分補給が有効！涼しい場所へ避難させ、服を緩めて体を冷やしましょう。"
            },
            {
                q: "【救急】成人へのAED（自動体外式除電器）\n電極パッドを貼り付ける正しい位置は？",
                opts: ["みぞおち と おへその下", "右胸の上（鎖骨の下）と 左胸の下", "両方の肩甲骨の間", "左胸の上 と 右胸の下"],
                ans: 2,
                desc: "心臓を挟み込むように「右胸の上」と「左胸の脇の下あたり」にしっかり貼り付けるのが正解です。"
            },
            {
                q: "【予防】コンセントのホコリと湿気で\n突然発火する危険な現象の名前は？",
                opts: ["スパーク現象", "トラッキング現象", "ショート現象", "オーバーロード現象"],
                ans: 2,
                desc: "長期間挿しっぱなしのプラグに起きる現象。定期的な清掃が最大の予防救急です！"
            },
            {
                q: "【救急】喉に異物を詰まらせて苦しんでいる！\n意識がある場合、まず試みるべき応急手当は？",
                opts: ["うがいをさせる", "背中の真ん中を何度も叩く（背部叩打法）", "お腹を思い切り膨らませる", "横向きに寝かせて放置する"],
                ans: 2,
                desc: "手のひらの付け根で、左右の肩甲骨の間を力強く何度も叩く「背部叩打法」などで異物除去を試みます。"
            },
            {
                q: "【予防】119番通報時、救急車を呼ぶ際に\n最初にハッキリと伝えるべき最も重要なことは？",
                opts: ["自分の名前と年齢", "現場の詳しい住所や目印", "怪我や病人の今の状態", "「火事」か「救急」かの区別"],
                ans: 4,
                desc: "指令員が最初に聞くのは「火事ですか？救急ですか？」です。落ち着いて「救急です」と答えましょう。"
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let currentRankIdx = 1; // 救急隊員スタート
        let gameState = 'START'; 
        let isCorrect = false;
        let showDesc = false;
        let animTimer = 0;

        // 効果音システム
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                osc.frequency.setValueAtTime(783.99, now + 0.16);
                osc.frequency.setValueAtTime(1046.50, now + 0.24);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.25);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'rankup') {
                osc.type = 'triangle';
                for(let i=0; i<6; i++) {
                    osc.frequency.setValueAtTime(440 + (i*100), now + (i*0.05));
                }
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            currentIdx = 0; score = 0; currentRankIdx = 1;
            loadQuestion();
            gameState = 'QUESTION';
            animate();
        }

        function loadQuestion() {
            showDesc = false;
            gameState = 'QUESTION';
            const q = quizData[currentIdx];
            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn-${i}`).innerText = `${i+1}. ${q.opts[i]}`;
                document.getElementById(`btn-${i}`).style.pointerEvents = "auto";
                document.getElementById(`btn-${i}`).style.opacity = "1";
            }
        }

        function selectAnswer(userAns) {
            if (gameState !== 'QUESTION') return;
            
            const q = quizData[currentIdx];
            isCorrect = (userAns === q.ans);
            
            if (isCorrect) {
                score++;
                currentRankIdx = Math.min(currentRankIdx + 1, 4); // ランクアップ
                playSound('rankup');
            } else {
                playSound('wrong');
            }

            gameState = 'JUDGE';
            showDesc = true;
            animTimer = 0;

            for (let i = 0; i < 4; i++) {
                document.getElementById(`btn-${i}`).style.pointerEvents = "none";
                if (i !== q.ans - 1) document.getElementById(`btn-${i}`).style.opacity = "0.3";
            }

            setTimeout(() => {
                canvas.addEventListener('click', nextStep, { once: true });
            }, 600);
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            gameState = 'END';
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('result-score').innerText = `5問中 ${score}問 正解`;
            
            const finalRank = RANKS[currentRankIdx];
            document.getElementById('result-rank').innerText = `最終階級：【${finalRank.name}】`;
            
            let comment = "";
            if (score === 5) comment = "素晴らしい！あなたは街の安全を守る本物のトップマスターです！";
            else if (score >= 3) comment = "高度な応急手当の手腕を持っています。頼りにしています！";
            else comment = "もう一度訓練を重ねて、立派なマスターを目指しましょう！";
            document.getElementById('result-comment').innerText = comment;
        }

        // --- 3Dかんだした立体ドット絵風トライくんの描画ルーチン ---
        function draw3DTryKun(x, y, rankIdx) {
            animTimer += 0.05;
            let bounce = Math.sin(animTimer) * 3; // 上下の揺らぎ演出

            // シャドウ（足元の影）
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 20, y + 65, 25, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            // 共通：顔と頭部
            ctx.fillStyle = '#f3a35f'; // 肌色
            ctx.fillRect(x, y + bounce, 40, 35); // 顔のベース
            
            // 目（立体感を出すための3Dシャドウ付き）
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 8, y + 12 + bounce, 6, 8);
            ctx.fillRect(x + 26, y + 12 + bounce, 6, 8);

            // にっこり口元
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 20, y + 22 + bounce, 6, 0, Math.PI);
            ctx.stroke();

            // ランク別：制服・帽子の立体レイヤー
            if (rankIdx === 1) { // 救急隊員 (ノーマル)
                ctx.fillStyle = '#3a86c8'; // 青キャップ
                ctx.fillRect(x - 4, y - 6 + bounce, 48, 12);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px Arial';
                ctx.fillText("トライ", x + 6, y + 3 + bounce);

                ctx.fillStyle = '#778899'; // 一般制服ボディ
                ctx.fillRect(x - 2, y + 35 + bounce, 44, 30);
            } 
            else if (rankIdx === 2) { // 上級救急隊員 (肩章・階級章プラス)
                ctx.fillStyle = '#1d3557'; // 濃紺キャップ
                ctx.fillRect(x - 4, y - 6 + bounce, 48, 12);
                ctx.fillStyle = '#ff0'; // 金のライン
                ctx.fillRect(x - 4, y + 4 + bounce, 48, 2);

                ctx.fillStyle = '#457b9d'; // 上級制服ボディ
                ctx.fillRect(x - 4, y + 35 + bounce, 48, 30);
                // 金の特進肩章
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(x - 6, y + 35 + bounce, 6, 6);
                ctx.fillRect(x + 40, y + 35 + bounce, 6, 6);
            } 
            else if (rankIdx === 3) { // 指導救命士 (ネクタイ、聴診器の3Dパーツ)
                ctx.fillStyle = '#1d3557'; // 救命士帽子
                ctx.fillRect(x - 4, y - 8 + bounce, 48, 14);
                ctx.fillStyle = '#e63946'; // 赤いエンブレムリボン
                ctx.fillRect(x + 14, y - 4 + bounce, 12, 6);

                ctx.fillStyle = '#334155'; // 重厚な制服
                ctx.fillRect(x - 6, y + 35 + bounce, 52, 32);
                // ネクタイ
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(x + 18, y + 35 + bounce, 4, 15);
                // 聴診器のメタリック表現
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x + 10, y + 50 + bounce, 6, 0, Math.PI);
                ctx.stroke();
            } 
            else if (rankIdx === 4) { // 予防救急マスター (豪華絢爛ゴールド仕様、たすき掛け)
                // 絢爛なゴールドの3D冠・エンブレム
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(x - 6, y - 10 + bounce, 52, 16);
                ctx.fillStyle = '#e63946'; // センターレッド
                ctx.fillRect(x + 16, y - 6 + bounce, 8, 8);

                // マスタータキシードボディ
                ctx.fillStyle = '#1e3a8a';
                ctx.fillRect(x - 8, y + 35 + bounce, 56, 32);

                // 金のエポレット（肩のフリンジ飾り）
                ctx.fillStyle = '#fbbf24';
                ctx.fillRect(x - 12, y + 34 + bounce, 8, 8);
                ctx.fillRect(x + 44, y + 34 + bounce, 8, 8);

                // 予防救急マスターの「たすき」
                ctx.fillStyle = '#fbbf24';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(x - 4, y + 35 + bounce);
                ctx.lineTo(x + 36, y + 67 + bounce);
                ctx.stroke();
            }

            // ゴールドネームプレート
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(x - 30, y + 75, 100, 18);
            ctx.strokeStyle = '#f1c40f';
            ctx.strokeRect(x - 30, y + 75, 100, 18);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(RANKS[rankIdx].name, x + 20, y + 88);
        }

        // --- メイン描画 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 近未来的な3Dグリッド風の背景
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(65, 90, 119, 0.2)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=20) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 上部情報バー
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(8, 8, canvas.width - 16, 40);
            ctx.strokeStyle = '#415a77';
            ctx.strokeRect(8, 8, canvas.width - 16, 40);

            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`訓練問題: ${currentIdx + 1} / ${quizData.length}`, 20, 32);
            ctx.textAlign = 'right';
            ctx.fillText(`現在の階級: ${RANKS[currentRankIdx].name}`, canvas.width - 20, 32);

            // 問題テキスト枠
            ctx.fillStyle = 'rgba(13, 27, 42, 0.9)';
            ctx.fillRect(8, 56, canvas.width - 16, 90);
            ctx.strokeRect(8, 56, canvas.width - 16, 90);

            ctx.fillStyle = '#fff';
            ctx.font = '13px sans-serif';
            ctx.textAlign = 'left';
            const lines = quizData[currentIdx].q.split('\n');
            for (let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], 20, 85 + (i * 24));
            }

            // トライくんの3D立体配置
            draw3DTryKun(170, 180, currentRankIdx);

            // 解説表示
            if (showDesc) {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
                ctx.fillRect(8, 56, canvas.width - 16, 315);
                ctx.strokeStyle = isCorrect ? '#00ff00' : '#e63946';
                ctx.strokeRect(8, 56, canvas.width - 16, 315);

                ctx.font = 'bold 22px sans-serif';
                ctx.textAlign = 'center';
                if (isCorrect) {
                    ctx.fillStyle = '#00ff00';
                    ctx.fillText('【 判定：合格 】', canvas.width / 2, 95);
                } else {
                    ctx.fillStyle = '#e63946';
                    ctx.fillText('【 判定：不合格 】', canvas.width / 2, 95);
                }

                // 解説
                ctx.fillStyle = '#e2e8f0';
                ctx.font = '13px sans-serif';
                ctx.textAlign = 'left';
                const desc = quizData[currentIdx].desc;
                const descLines = [];
                // 24文字ごとに自動改行
                for (let i = 0; i < desc.length; i += 24) {
                    descLines.push(desc.substring(i, i + 24));
                }
                for (let i = 0; i < descLines.length; i++) {
                    ctx.fillText(descLines[i], 24, 140 + (i * 22));
                }

                ctx.fillStyle = '#f1c40f';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('▼ 画面をタップして次の訓練ステージへ', canvas.width / 2, 350);
            }
        }

        function animate() {
            if (gameState === 'END') return;
            draw();
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
