<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071f4a">
  <meta name="description" content="北っ子ファイヤーズ ソフトボールクイズゲーム">
  <title>北っ子ファイヤーズ｜ソフトボールクイズゲーム</title>
  <style>
:root {
  --navy-950: #03132e;
  --navy-900: #071f4a;
  --navy-800: #0b3371;
  --navy-700: #164d96;
  --red-700: #b61919;
  --red-600: #d92920;
  --orange-500: #ff7a00;
  --orange-300: #ffb443;
  --gold-500: #dca92d;
  --cream: #fff9e9;
  --white: #fff;
  --ink: #15223b;
  --muted: #63708a;
  --success: #168653;
  --danger: #c62828;
  --shadow: 0 18px 42px rgba(1, 18, 48, .28);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  background: linear-gradient(180deg, #0a57a8 0%, #0a2b64 36%, #03132e 100%);
  overflow-x: hidden;
}
button, input { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }
a { color: inherit; }

.stadium-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at 14% 8%, rgba(255,255,255,.9) 0 4%, transparent 11%),
    radial-gradient(circle at 82% 5%, rgba(255,255,255,.8) 0 3%, transparent 10%),
    linear-gradient(180deg, rgba(49,155,237,.95) 0 28%, rgba(21,116,178,.88) 28% 38%, rgba(15,79,78,.92) 38% 55%, rgba(156,87,33,.9) 55% 100%);
}
.stadium-bg::before {
  content: "";
  position: absolute;
  left: -8%; right: -8%; bottom: 22%; height: 26%;
  background:
    repeating-linear-gradient(90deg, rgba(5,42,65,.6) 0 4px, transparent 4px 74px),
    repeating-linear-gradient(0deg, rgba(5,42,65,.42) 0 3px, transparent 3px 48px);
  transform: perspective(520px) rotateX(57deg);
  transform-origin: bottom;
  opacity: .55;
}
.stadium-bg::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0; height: 42%;
  background:
    radial-gradient(ellipse at 50% 75%, transparent 0 14%, rgba(255,255,255,.82) 14.2% 14.8%, transparent 15%),
    linear-gradient(180deg, rgba(141,78,31,.1), rgba(105,54,24,.62));
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 30;
  min-height: 58px;
  padding: max(8px, env(safe-area-inset-top)) 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(3, 19, 46, .9);
  border-bottom: 1px solid rgba(255,255,255,.14);
  backdrop-filter: blur(12px);
}
.brand-button, .sound-button {
  border: 0;
  color: white;
  background: transparent;
  cursor: pointer;
}
.brand-button {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 900;
  letter-spacing: .02em;
}
.brand-mark { font-size: 1.35rem; }
.sound-button {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  font-size: 1.15rem;
}

.app-shell {
  width: min(100%, 980px);
  margin: 0 auto;
  padding: 16px 12px calc(34px + var(--safe-bottom));
}
.app-footer {
  padding: 10px 16px calc(16px + var(--safe-bottom));
  text-align: center;
  color: rgba(255,255,255,.82);
  font-size: .76rem;
  background: rgba(3,19,46,.76);
}
.app-footer p { margin: 0; }

.hero {
  position: relative;
  overflow: hidden;
  min-height: 385px;
  padding: 24px 18px 20px;
  border: 3px solid rgba(255,202,75,.88);
  border-radius: 34px;
  color: white;
  background:
    radial-gradient(circle at 82% 18%, rgba(255,166,0,.25), transparent 35%),
    linear-gradient(145deg, rgba(3,26,70,.97), rgba(5,74,151,.92) 52%, rgba(8,31,77,.97));
  box-shadow: var(--shadow), inset 0 0 0 5px rgba(255,255,255,.08);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 10px);
  pointer-events: none;
}
.hero-flame {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--red-600), var(--orange-500));
  font-weight: 900;
  box-shadow: 0 6px 18px rgba(229,48,25,.35);
}
.hero-title {
  position: relative;
  z-index: 2;
  width: min(68%, 570px);
  margin: 12px 0 0;
  font-size: clamp(2rem, 6vw, 4.4rem);
  line-height: .98;
  letter-spacing: -.055em;
  text-shadow: 0 4px 0 #9d1616, 0 8px 18px rgba(0,0,0,.4);
}
.hero-subtitle {
  position: relative;
  z-index: 2;
  width: min(62%, 520px);
  margin: 14px 0 0;
  font-size: clamp(1rem, 2.6vw, 1.5rem);
  font-weight: 900;
  line-height: 1.35;
}
.hero-character {
  position: absolute;
  right: -2px;
  bottom: -20px;
  width: min(43%, 320px);
  max-height: 365px;
  object-fit: cover;
  object-position: 50% 36%;
  border-radius: 26px 0 0 0;
  filter: drop-shadow(-12px 14px 18px rgba(0,0,0,.35));
}
.hero-ribbon {
  position: relative;
  z-index: 3;
  display: inline-block;
  margin-top: 20px;
  padding: 9px 15px;
  max-width: 62%;
  border-radius: 9px;
  color: #fff4b9;
  background: linear-gradient(90deg, #ad1118, #e4311f, #ad1118);
  border: 2px solid #ffac33;
  font-weight: 900;
}

.status-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) repeat(2, minmax(100px, .65fr));
  gap: 10px;
  margin-top: 14px;
}
.status-card {
  min-width: 0;
  padding: 14px;
  border: 2px solid rgba(255,205,86,.92);
  border-radius: 18px;
  background: rgba(255,250,236,.96);
  box-shadow: var(--shadow);
}
.status-label { color: var(--muted); font-size: .79rem; font-weight: 800; }
.status-value { margin-top: 4px; font-weight: 1000; font-size: clamp(1.1rem, 3.2vw, 1.7rem); }
.rank-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  color: white;
  background: linear-gradient(90deg, var(--navy-900), var(--navy-700));
  border-radius: 11px;
  padding: 7px 10px;
  font-weight: 900;
}
.progress-track {
  height: 12px;
  overflow: hidden;
  margin-top: 10px;
  border-radius: 99px;
  background: #d6d9df;
}
.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #ff3729, #ff9c19);
  transition: width .35s ease;
}

.section-title {
  margin: 24px 0 12px;
  color: white;
  font-size: clamp(1.3rem, 4vw, 2rem);
  font-weight: 1000;
  text-shadow: 0 3px 12px rgba(0,0,0,.5);
}
.course-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.course-card {
  position: relative;
  min-height: 218px;
  padding: 16px;
  overflow: hidden;
  border: 3px solid var(--course-accent);
  border-radius: 24px;
  color: var(--ink);
  text-align: left;
  background: linear-gradient(155deg, rgba(255,255,255,.98), rgba(255,247,226,.94));
  box-shadow: var(--shadow), inset 0 0 0 3px rgba(255,255,255,.7);
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}
.course-card:active { transform: scale(.985); }
.course-card::after {
  content: "";
  position: absolute;
  inset: auto -28px -38px auto;
  width: 130px; height: 130px;
  border-radius: 50%;
  background: color-mix(in srgb, var(--course-accent) 15%, transparent);
}
.course-number {
  position: absolute;
  top: 0; left: 0;
  display: grid;
  place-items: center;
  width: 43px; height: 43px;
  color: white;
  background: var(--course-accent);
  border-radius: 0 0 18px 0;
  font-size: 1.35rem;
  font-weight: 1000;
}
.course-icon { font-size: 2.4rem; margin-left: 36px; }
.course-card h3 { margin: 10px 0 6px; color: var(--course-accent); font-size: clamp(1.1rem, 3.3vw, 1.55rem); }
.course-count {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 99px;
  color: white;
  background: var(--course-accent);
  font-size: .82rem;
  font-weight: 900;
}
.course-desc { min-height: 42px; margin: 9px 0; color: #3c475b; font-size: .88rem; line-height: 1.45; }
.course-score {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding-top: 8px;
  border-top: 1px solid #ddd5c5;
  font-size: .79rem;
  font-weight: 900;
}
.badge-dot { font-size: 1.5rem; filter: grayscale(1); opacity: .4; }
.badge-dot.unlocked { filter: none; opacity: 1; }

.badge-panel {
  margin-top: 14px;
  padding: 14px;
  border: 2px solid rgba(255,205,86,.86);
  border-radius: 24px;
  color: white;
  background: linear-gradient(180deg, rgba(4,35,84,.95), rgba(2,20,49,.98));
  box-shadow: var(--shadow);
}
.badge-list {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
}
.badge-item { text-align: center; font-size: .68rem; font-weight: 800; }
.badge-medal {
  width: 58px; height: 66px;
  margin: 0 auto 6px;
  display: grid;
  place-items: center;
  border-radius: 28px 28px 36px 36px;
  border: 3px solid #e2b340;
  background: linear-gradient(145deg, #c7261e, #68131b);
  font-size: 1.8rem;
  filter: grayscale(1);
  opacity: .42;
}
.badge-item.unlocked .badge-medal { filter: none; opacity: 1; box-shadow: 0 0 22px rgba(255,190,54,.5); }

.primary-cta, .secondary-cta, .danger-cta {
  width: 100%;
  min-height: 56px;
  padding: 13px 18px;
  border: 0;
  border-radius: 18px;
  font-weight: 1000;
  cursor: pointer;
}
.primary-cta {
  margin-top: 18px;
  color: white;
  background: linear-gradient(180deg, #ff4a29, #c91318);
  border: 3px solid #ffc45b;
  box-shadow: 0 10px 0 #7e1114, 0 17px 28px rgba(0,0,0,.3);
  font-size: clamp(1.2rem, 4vw, 1.8rem);
}
.primary-cta:active { transform: translateY(5px); box-shadow: 0 5px 0 #7e1114; }
.secondary-cta { color: white; background: linear-gradient(180deg, var(--navy-700), var(--navy-900)); }
.danger-cta { color: white; background: linear-gradient(180deg, #e44938, #9d1111); }
.button-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }

.screen-card {
  overflow: hidden;
  border: 3px solid rgba(255,202,75,.86);
  border-radius: 28px;
  background: rgba(255,251,240,.98);
  box-shadow: var(--shadow);
}
.screen-head {
  padding: 14px 16px;
  color: white;
  background: linear-gradient(90deg, var(--navy-900), var(--navy-700));
}
.screen-head-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.screen-title { margin: 0; font-size: clamp(1.2rem, 4vw, 1.7rem); }
.screen-sub { margin-top: 4px; color: rgba(255,255,255,.78); font-size: .82rem; }
.quiz-home-button {
  flex: 0 0 auto;
  min-height: 40px;
  padding: 8px 11px;
  border: 2px solid rgba(255,255,255,.5);
  border-radius: 12px;
  color: white;
  background: rgba(255,255,255,.12);
  font-size: .78rem;
  font-weight: 1000;
  cursor: pointer;
  white-space: nowrap;
}
.quiz-home-button:active { transform: scale(.97); background: rgba(255,255,255,.2); }
.quiz-status {
  display: grid;
  grid-template-columns: 94px minmax(0, 1fr);
  gap: 12px;
  padding: 12px 14px 0;
}
.mini-rank-image {
  width: 94px;
  height: 118px;
  object-fit: cover;
  border-radius: 14px;
  border: 3px solid #d7ab43;
  background: #dbe7f5;
}
.status-stack { min-width: 0; }
.status-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 7px; font-size: .84rem; font-weight: 900; }
.question-wrap { padding: 14px; }
.category-pill {
  display: inline-block;
  padding: 5px 10px;
  border-radius: 99px;
  color: white;
  background: var(--orange-500);
  font-size: .76rem;
  font-weight: 900;
}
.question-text { margin: 12px 0 14px; font-size: clamp(1.02rem, 4vw, 1.33rem); line-height: 1.62; font-weight: 900; }
.choice-list { display: grid; gap: 9px; }
.choice-button {
  width: 100%;
  min-height: 54px;
  padding: 12px 13px;
  display: grid;
  grid-template-columns: 34px minmax(0,1fr);
  gap: 8px;
  align-items: center;
  border: 2px solid #ccd3df;
  border-radius: 15px;
  color: var(--ink);
  text-align: left;
  background: white;
  cursor: pointer;
}
.choice-button:not(:disabled):active { transform: scale(.99); }
.choice-button:disabled { cursor: default; }
.choice-key {
  width: 30px; height: 30px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  color: white;
  background: var(--navy-700);
  font-weight: 1000;
}
.choice-button.correct { border-color: var(--success); background: #e7f8ef; }
.choice-button.wrong { border-color: var(--danger); background: #fdebea; }

.feedback {
  margin-top: 13px;
  padding: 14px;
  border-radius: 16px;
  background: #f2f5fa;
  border-left: 6px solid var(--navy-700);
}
.feedback.success { background: #e8f8ef; border-left-color: var(--success); }
.feedback.error { background: #fff0ef; border-left-color: var(--danger); }
.feedback h3 { margin: 0 0 8px; }
.feedback p { margin: 7px 0; line-height: 1.55; }
.source-link { display: inline-flex; margin-top: 5px; color: #0c55a2; font-size: .78rem; font-weight: 800; }
.ruling-grid { display: grid; gap: 7px; margin-top: 10px; }
.ruling-row { padding: 9px 10px; border-radius: 10px; background: rgba(255,255,255,.8); font-size: .84rem; }
.ruling-row strong { color: var(--navy-800); }

.batting-stage {
  position: relative;
  min-height: 520px;
  overflow: hidden;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 12%, rgba(255,255,255,.85) 0 1px, transparent 2px),
    linear-gradient(180deg, #4ba9e8 0 34%, #5db96e 34% 59%, #9a5c31 59% 100%);
  perspective: 900px;
}
.batting-stage::after {
  content: "";
  position: absolute;
  z-index: 1;
  left: -12%; right: -12%; bottom: -18%;
  height: 53%;
  background:
    linear-gradient(84deg, transparent 48.9%, rgba(255,255,255,.88) 49.2% 49.7%, transparent 50%),
    linear-gradient(96deg, transparent 48.9%, rgba(255,255,255,.88) 49.2% 49.7%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, #b97542 0 32%, #8d4d28 33% 52%, transparent 53%);
  transform: rotateX(60deg);
  transform-origin: bottom;
  opacity: .95;
  pointer-events: none;
}
.stadium-cloud {
  position: absolute;
  z-index: 0;
  width: 110px; height: 34px;
  border-radius: 999px;
  background: rgba(255,255,255,.72);
  filter: blur(.2px);
  box-shadow: 28px -13px 0 2px rgba(255,255,255,.72), 58px 1px 0 -4px rgba(255,255,255,.68);
}
.stadium-cloud.cloud-a { left: 7%; top: 62px; transform: scale(.62); }
.stadium-cloud.cloud-b { right: 8%; top: 92px; transform: scale(.46); opacity: .72; }
.stadium-light {
  position: absolute;
  z-index: 2;
  top: 54px;
  width: 15px; height: 165px;
  background: linear-gradient(90deg,#4c5562,#a4adb8 45%,#3e4752);
  transform-origin: bottom;
  opacity: .92;
}
.stadium-light::before {
  content: "";
  position: absolute;
  left: 50%; top: -14px;
  width: 78px; height: 32px;
  transform: translateX(-50%);
  border: 4px solid #515a65;
  border-radius: 5px;
  background:
    radial-gradient(circle, #fffbd4 0 3px, #ffe36a 4px 6px, transparent 7px) 0 0/18px 16px,
    #313944;
  box-shadow: 0 0 24px rgba(255,243,160,.62);
}
.stadium-light.left { left: 6%; transform: rotate(-6deg); }
.stadium-light.right { right: 6%; transform: rotate(6deg); }
.stands {
  position: absolute;
  z-index: 1;
  left: 0; right: 0; top: 142px;
  height: 124px;
  overflow: hidden;
  border-top: 8px solid #263c4c;
  border-bottom: 9px solid #17303d;
  background:
    radial-gradient(circle, #ffca45 0 2px, transparent 2.8px) 0 0/18px 15px,
    radial-gradient(circle, #e84932 0 2px, transparent 2.8px) 8px 7px/21px 17px,
    radial-gradient(circle, #e7edf2 0 2px, transparent 3px) 2px 4px/25px 19px,
    linear-gradient(180deg,#465e6b,#263c48);
  transform: perspective(500px) rotateX(-7deg);
}
.outfield-wall {
  position: absolute;
  z-index: 2;
  left: 0; right: 0; top: 252px;
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff3c3;
  border-top: 4px solid #d5aa49;
  border-bottom: 4px solid #0c2536;
  background: linear-gradient(180deg,#0a3b36,#072821);
  font-weight: 1000;
  letter-spacing: .12em;
  text-shadow: 0 3px 0 rgba(0,0,0,.55);
}
.outfield-wall::before,
.outfield-wall::after {
  content: "🔥";
  margin: 0 22px;
}
.scoreboard-strip {
  position: relative;
  z-index: 9;
  margin: 12px;
  padding: 10px 12px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px 12px;
  align-items: center;
  border: 2px solid rgba(255,211,101,.8);
  border-radius: 13px;
  color: white;
  background: linear-gradient(180deg,rgba(3,19,46,.96),rgba(8,47,84,.94));
  box-shadow: 0 8px 20px rgba(0,0,0,.28);
  font-size: .8rem;
  font-weight: 900;
}
.scoreboard-main { font-size: .92rem; }
.scoreboard-sub { color: #ffe17a; text-align: right; }
.pitch-meter {
  grid-column: 1 / -1;
  height: 5px;
  overflow: hidden;
  border-radius: 99px;
  background: rgba(255,255,255,.18);
}
.pitch-meter > i {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg,#62d8ff,#fff16b,#ff562f);
  transition: width .2s ease;
}
.field-marking {
  position: absolute;
  z-index: 3;
  left: 50%; bottom: 28px;
  width: 360px; height: 235px;
  transform: translateX(-50%) perspective(600px) rotateX(56deg);
  transform-origin: bottom;
  border: 4px solid rgba(255,255,255,.88);
  border-top: 0;
  clip-path: polygon(50% 0,100% 100%,0 100%);
  pointer-events: none;
}
.pitchers-mound {
  position: absolute;
  z-index: 4;
  left: 46%; top: 55%;
  width: 88px; height: 30px;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  background: radial-gradient(ellipse at center,#c98851 0 42%,#8a4e2b 68%,transparent 70%);
  box-shadow: inset 0 4px 7px rgba(255,255,255,.22);
}
.home-plate {
  position: absolute;
  z-index: 6;
  right: 13%; bottom: 66px;
  width: 44px; height: 37px;
  background: #f4f2e7;
  border: 2px solid #9b9b93;
  clip-path: polygon(10% 0,90% 0,100% 58%,50% 100%,0 58%);
  filter: drop-shadow(0 4px 2px rgba(0,0,0,.22));
}
.batters-box {
  position: absolute;
  z-index: 5;
  right: 2%; bottom: 48px;
  width: 155px; height: 122px;
  border: 3px solid rgba(255,255,255,.82);
  transform: skewY(-6deg);
  opacity: .82;
}
.player-shadow {
  position: absolute;
  left: 50%; bottom: -7px;
  width: 90%; height: 18px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: rgba(0,0,0,.28);
  filter: blur(5px);
}
.pitcher-real,
.batter-real {
  position: absolute;
  z-index: 7;
  transform-origin: 50% 88%;
  filter: drop-shadow(0 8px 9px rgba(0,0,0,.28));
}
.pitcher-real {
  left: 35%; top: 45%;
  width: 76px; height: 143px;
  transform: scale(.68);
}
.batter-real {
  right: 4.5%; bottom: 79px;
  width: 104px; height: 178px;
}
.player-head {
  position: absolute;
  z-index: 5;
  left: 50%; top: 4px;
  width: 45px; height: 48px;
  transform: translateX(-50%);
  border-radius: 48% 48% 44% 44%;
  background: linear-gradient(135deg,#f8be87,#d88756);
  border: 2px solid #6d321f;
}
.player-cap {

@keyframes pitcherDrive {
  0% { transform: scale(.68) translate(0,0) rotate(0); }
  28% { transform: scale(.68) translate(-5px,-9px) rotate(-8deg); }
  58% { transform: scale(.68) translate(12px,2px) rotate(13deg); }
  100% { transform: scale(.68) translate(20px,6px) rotate(5deg); }
}
@keyframes throwingArm {
  0% { transform: rotate(-54deg); }
  28% { transform: rotate(-145deg); }
  60% { transform: rotate(62deg); }
  100% { transform: rotate(118deg); }
}
@keyframes strideLeg {
  0%,25% { transform: rotate(0); }
  65%,100% { transform: rotate(-34deg) translate(-9px,-2px); }
}
@keyframes batterWeightShift {
  0% { transform: rotate(0) translateX(0); }
  42% { transform: rotate(-5deg) translateX(-4px); }
  100% { transform: rotate(8deg) translateX(-10px); }
}
@keyframes realisticBatSwing {
  0% { transform: rotate(-28deg); }
  38% { transform: rotate(-78deg) translateY(-3px); }
  70% { transform: rotate(-162deg) translate(-5px,10px); }
  100% { transform: rotate(-218deg) translate(-9px,16px); }
}
@keyframes frontArmSwing { to { transform: rotate(-104deg) translateY(5px); } }
@keyframes backArmSwing { to { transform: rotate(-73deg) translate(-6px,7px); } }
@keyframes contactBurst {
  0% { opacity: 0; transform: translate(-50%,-50%) scale(.1) rotate(0); }
  40% { opacity: 1; transform: translate(-50%,-50%) scale(1.1) rotate(12deg); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1.55) rotate(28deg); }
}
@keyframes stadiumShake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-5px,2px); }
  40% { transform: translate(5px,-2px); }
  60% { transform: translate(-3px,1px); }
  80% { transform: translate(3px,-1px); }
}
@keyframes popIn { from { opacity: 0; transform: scale(.75); } }
@keyframes rise { to { transform: translateY(-560px) rotate(180deg); opacity: 0; } }
@keyframes toast { from { opacity: 0; transform: translate(-50%,20px); } }
