<style>
:root{
 --navy:#061a3a;--navy2:#0b2f68;--blue:#1564b8;--red:#d3261d;--orange:#ff7b00;

*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;min-height:100vh;overflow-x:hidden;background:#061a3a;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}img{display:block;max-width:100%}.hidden{display:none!important}
.appbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;min-height:62px;padding:max(8px,var(--safe-top)) 14px 8px;background:rgba(3,15,40,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.12);color:white}
.brand{display:flex;align-items:center;gap:9px;border:0;background:none;color:white;font-weight:1000;font-size:1rem}.brand b{font-size:1.3rem}.icon-btn{width:44px;height:44px;border:1px solid rgba(255,255,255,.16);border-radius:50%;background:rgba(255,255,255,.09);color:white;font-size:1.15rem}

.hero:before{content:"";position:absolute;inset:auto -10% 0;height:42%;background:linear-gradient(180deg,rgba(13,91,59,.85) 0 48%,rgba(127,69,29,.96) 49%);clip-path:polygon(0 30%,100% 0,100% 100%,0 100%)}
.hero:after{content:"";position:absolute;left:-10%;right:-10%;bottom:28%;height:18%;background:repeating-linear-gradient(90deg,rgba(2,12,25,.52) 0 3px,transparent 3px 30px),repeating-linear-gradient(0deg,rgba(2,12,25,.4) 0 2px,transparent 2px 18px);transform:perspective(320px) rotateX(65deg);opacity:.55}
.hero-copy{position:relative;z-index:3;width:58%}.eyebrow{display:inline-flex;padding:6px 10px;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--orange));font-size:.72rem;font-weight:900;box-shadow:0 8px 20px rgba(229,65,22,.34)}
.hero h1{margin:12px 0 5px;font-size:clamp(2.25rem,10vw,4.7rem);line-height:.88;letter-spacing:-.07em;text-shadow:0 4px 0 #9d1515,0 8px 18px rgba(0,0,0,.45)}.hero-game{margin:8px 0 0;font-size:clamp(1rem,4vw,1.5rem);font-weight:1000}.hero-tag{display:inline-block;margin-top:14px;padding:8px 10px;border:2px solid #ffbf4c;border-radius:10px;background:linear-gradient(90deg,#a91017,#ed3c24,#a91017);color:#fff2ab;font-weight:1000;font-size:.78rem}
.hero-rank{position:absolute;z-index:4;right:7px;bottom:62px;width:min(42%,300px);filter:drop-shadow(-12px 16px 18px rgba(0,0,0,.38))}.rank-image{width:100%;aspect-ratio:1122/1402;object-fit:contain;border-radius:14px}.rank-fallback{display:grid;place-items:center;aspect-ratio:1122/1402;border:3px solid var(--gold);border-radius:14px;background:linear-gradient(145deg,#09265a,#04142f);color:white;text-align:center;font-weight:1000}.rank-fallback strong{font-size:3rem;color:#ffd865}.rank-fallback span{display:block;font-size:.85rem}
.hero-actions{position:absolute;z-index:6;left:16px;right:16px;bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:9px}.hero-actions button{min-height:54px;border:0;border-radius:15px;color:white;font-weight:1000;box-shadow:0 7px 0 rgba(0,0,0,.32),0 12px 22px rgba(0,0,0,.25)}.btn-fire{background:linear-gradient(180deg,#ff9824,#d82919)}.btn-blue{background:linear-gradient(180deg,#24a2ee,#07509c)}.hero-actions button:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.35)}
.panel{margin-top:13px;padding:15px;border:2px solid rgba(232,187,67,.95);border-radius:22px;background:rgba(255,250,238,.98);box-shadow:var(--shadow)}.panel-title{margin:0 0 12px;font-size:1.1rem}.stats{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:8px}.stat{padding:12px 10px;border:1px solid #dfd3b4;border-radius:15px;background:white}.stat small{display:block;color:var(--muted);font-weight:800;font-size:.7rem}.stat strong{display:block;margin-top:5px;font-size:1.12rem}.progress-row{display:flex;justify-content:space-between;gap:10px;margin-top:9px;font-size:.78rem;font-weight:900}.bar{overflow:hidden;height:11px;margin-top:6px;border-radius:99px;background:#dbe2eb;box-shadow:inset 0 2px 4px rgba(0,0,0,.14)}.bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,#df221b,#ff8a00,#ffd14f);box-shadow:0 0 11px rgba(255,111,0,.5)}
.practice-card{position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;margin-top:13px;padding:20px 17px;border:3px solid #f4c85d;border-radius:25px;color:white;background:radial-gradient(circle at 84% 30%,rgba(255,151,0,.35),transparent 28%),linear-gradient(135deg,#38100a,#a11916 50%,#071d47);box-shadow:var(--shadow)}.practice-card:after{content:"🥎";position:absolute;right:18%;top:-30px;font-size:8rem;opacity:.08;transform:rotate(-18deg)}.practice-card h2{margin:0 0 6px}.practice-card p{margin:0;color:rgba(255,255,255,.83);font-size:.83rem;line-height:1.5}.practice-record{margin-top:9px;color:#ffe071;font-weight:1000}.practice-card button{position:relative;z-index:2;min-width:145px;min-height:56px;border:0;border-radius:15px;background:linear-gradient(180deg,#ffc83f,#ed6818);color:#35120a;font-weight:1000;box-shadow:0 7px 0 #9d3d0f}.practice-card button:active{transform:translateY(5px);box-shadow:0 2px 0 #9d3d0f}
.section-heading{margin:20px 2px 10px;color:white;font-size:1.15rem}.course-grid{display:grid;grid-template-columns:1fr;gap:10px}.course{position:relative;overflow:hidden;display:grid;grid-template-columns:58px 1fr auto;gap:10px;align-items:center;width:100%;padding:14px;border:3px solid var(--accent);border-radius:21px;background:linear-gradient(145deg,#fffdf5,#f6ebd4);box-shadow:var(--shadow);text-align:left}.course:active{transform:scale(.985)}.course-no{display:grid;place-items:center;width:48px;height:48px;border-radius:50%;background:var(--accent);color:white;font-size:1.45rem;font-weight:1000}.course h3{margin:0;color:var(--accent);font-size:1.08rem}.course p{margin:4px 0;color:#465169;font-size:.77rem;line-height:1.4}.course-meta{font-size:.69rem;color:#68748b;font-weight:800}.course-score{text-align:right}.course-score strong{display:block;font-size:1.16rem;color:var(--accent)}.course-score span{font-size:.65rem;color:#68748b}.course .mini-bar{grid-column:2/4;height:7px;border-radius:99px;background:#d8dde5;overflow:hidden}.course .mini-bar i{display:block;height:100%;background:var(--accent)}
.badges{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:7px}.badge{padding:9px 5px;border-radius:14px;text-align:center;background:#e5e7eb;filter:grayscale(1);opacity:.58}.badge.unlocked{background:linear-gradient(145deg,#fff8cd,#f7bd37);filter:none;opacity:1;box-shadow:0 7px 14px rgba(199,124,0,.2)}.badge-icon{font-size:1.8rem}.badge span{display:block;margin-top:4px;font-size:.58rem;font-weight:900}.tools{display:flex;flex-wrap:wrap;gap:8px}.tools button{flex:1;min-width:110px;min-height:44px;border:1px solid #c8ced8;border-radius:12px;background:white;color:#26344f;font-weight:900}
.screen{overflow:hidden;border:2px solid var(--gold);border-radius:24px;background:#fffaf0;box-shadow:var(--shadow)}.screen-head{padding:15px;color:white;background:linear-gradient(135deg,#061b3e,#0d4e96)}.screen-head-row{display:flex;align-items:center;justify-content:space-between;gap:8px}.screen h1{margin:0;font-size:1.25rem}.screen-sub{margin-top:4px;color:rgba(255,255,255,.8);font-size:.73rem}.home-small{min-height:42px;padding:8px 10px;border:1px solid rgba(255,255,255,.3);border-radius:12px;background:rgba(255,255,255,.1);color:white;font-weight:900;font-size:.73rem}.quiz-body{padding:14px}.quiz-rank{display:grid;grid-template-columns:92px 1fr;gap:12px;align-items:center;padding:10px;border:1px solid #ddcfad;border-radius:16px;background:white}.quiz-rank .rank-image,.quiz-rank .rank-fallback{width:92px}.category{display:inline-flex;margin-top:15px;padding:5px 9px;border-radius:999px;background:#fff0c0;color:#7a4c00;font-size:.7rem;font-weight:1000}.question{margin:10px 0 13px;font-size:1.12rem;line-height:1.52}.choices{display:grid;gap:9px}.choice{display:grid;grid-template-columns:36px 1fr;align-items:center;gap:8px;min-height:56px;padding:9px 10px;border:2px solid #cbd4df;border-radius:14px;background:white;color:#182541;text-align:left;font-weight:850}.choice b{display:grid;place-items:center;width:31px;height:31px;border-radius:50%;background:#0d4f9b;color:white}.choice.correct{border-color:#15945b;background:#e7f8ef}.choice.wrong{border-color:#d42a27;background:#fee8e7}.choice:disabled{opacity:1}.feedback{margin-top:15px;padding:14px;border-radius:15px;border-left:6px solid var(--green);background:#e9f8ef}.feedback.bad{border-color:var(--red);background:#fff0ef}.feedback h3{margin:0 0 9px}.feedback p{font-size:.86rem;line-height:1.55}.source{display:inline-block;margin-top:4px;color:#075cb2;font-size:.74rem;font-weight:900}.ruling{margin-top:10px;padding:10px;border-radius:12px;background:#edf1f8;font-size:.77rem;line-height:1.65}.primary,.secondary{width:100%;min-height:50px;margin-top:10px;border:0;border-radius:14px;color:white;font-weight:1000}.primary{background:linear-gradient(180deg,#ff901b,#d5281d)}.secondary{background:linear-gradient(180deg,#287ed0,#0d3f80)}
.batting-shell{padding-bottom:calc(88px + var(--safe-bottom));background:#020915}.batting-wrap{position:relative;background:#020915}.canvas-wrap{position:relative;width:100%;height:clamp(490px,69vh,720px);overflow:hidden;background:#091124}.game-canvas{display:block;width:100%;height:100%;touch-action:none}.batting-hud{position:absolute;left:8px;right:8px;top:8px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}.hud-box{padding:7px 9px;border:1px solid rgba(255,218,95,.7);border-radius:10px;background:rgba(2,8,22,.78);color:white;font-size:.68rem;font-weight:1000;backdrop-filter:blur(5px)}.hud-box strong{color:#ffd85b}.batting-message{position:absolute;left:10px;right:10px;bottom:9px;padding:10px;border-radius:12px;background:rgba(2,8,22,.78);color:white;text-align:center;font-size:.78rem;font-weight:900;backdrop-filter:blur(6px)}.result-banner{position:absolute;left:50%;top:20%;transform:translate(-50%,-50%) scale(.8);width:86%;padding:12px;border:3px solid #ffcf4a;border-radius:17px;background:linear-gradient(180deg,#ef3c1c,#9e1217);color:white;text-align:center;font-size:clamp(1.25rem,6vw,2.4rem);font-weight:1000;text-shadow:0 3px 0 #7d1111;opacity:0;pointer-events:none}.result-banner.show{animation:pop .65s forwards}.result-banner.hit{background:linear-gradient(180deg,#2a8bdc,#0b478f)}.result-banner.miss{background:linear-gradient(180deg,#5a6476,#252d3a)}@keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.55)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.batting-controls{position:fixed;z-index:120;left:0;right:0;bottom:0;padding:8px 10px calc(8px + var(--safe-bottom));background:linear-gradient(180deg,rgba(2,8,22,.72),#020815 22%);border-top:1px solid rgba(255,255,255,.16)}.control-row{display:grid;grid-template-columns:1fr 1.8fr;gap:9px;width:min(100%,720px);margin:auto}.pitch-btn,.swing-btn{min-height:64px;border:0;border-radius:17px;color:white;font-weight:1000}.pitch-btn{background:linear-gradient(180deg,#2785d9,#0b417f)}.swing-btn{background:linear-gradient(180deg,#ff9c22,#d62b19);font-size:1.25rem;box-shadow:0 7px 0 #801414}.swing-btn:active:not(:disabled){transform:translateY(5px);box-shadow:0 2px 0 #801414}.pitch-btn:disabled,.swing-btn:disabled{opacity:.45}.next-bat{width:min(100%,720px);margin:8px auto 0;min-height:49px;border:0;border-radius:14px;background:linear-gradient(180deg,#ffd35b,#df881b);color:#3b2200;font-weight:1000}
.result{padding:16px}.result-rank{display:grid;grid-template-columns:130px 1fr;gap:13px;align-items:center}.result-rank .rank-image,.result-rank .rank-fallback{width:130px}.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:15px}.score-cell{padding:13px 7px;border-radius:13px;background:#eef2f7;text-align:center}.score-cell small{display:block;color:#68758b}.score-cell strong{font-size:1.4rem}.review-item{margin-top:10px;padding:12px;border-radius:13px;background:#fff;border:1px solid #d9dee8}.review-item h3{margin:0 0 7px;font-size:.9rem}.review-item p{font-size:.78rem;line-height:1.5}.modal{position:fixed;z-index:200;inset:0;display:grid;place-items:center;padding:18px;background:rgba(0,8,24,.72)}.modal-card{width:min(100%,520px);max-height:82vh;overflow:auto;padding:20px;border:3px solid var(--gold);border-radius:22px;background:white;box-shadow:var(--shadow)}.modal-card h2{margin-top:0}.modal-card li{margin:7px 0;font-size:.85rem;line-height:1.5}
.startup{margin:40px auto;padding:20px;border:2px solid var(--gold);border-radius:18px;background:white;text-align:center}
@media(min-width:680px){.course-grid{grid-template-columns:1fr 1fr}.hero{min-height:500px}.hero-rank{width:310px}.hero-copy{width:65%}}
@media(max-width:470px){#app{padding-left:8px;padding-right:8px}.hero{min-height:400px;padding:17px 13px}.hero-copy{width:60%}.hero h1{font-size:2.45rem}.hero-rank{width:42%;right:3px;bottom:64px}.hero-actions{left:10px;right:10px}.hero-actions button{font-size:.78rem}.stats{grid-template-columns:1fr 1fr}.stats .stat:first-child{grid-column:1/-1}.practice-card{grid-template-columns:1fr}.practice-card button{width:100%}.badges{grid-template-columns:repeat(3,1fr)}.course{grid-template-columns:50px 1fr auto;padding:11px 9px}.course p{font-size:.72rem}.result-rank{grid-template-columns:105px 1fr}.result-rank .rank-image,.result-rank .rank-fallback{width:105px}.score-grid{gap:5px}.score-cell{padding:10px 3px}}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important}}
</style>

<script>
const QUESTIONS=[{"id":"player-01","course":"player","category":"走塁","difficulty":1,"funny":true,"question":"内野ゴロを打ちました。一塁へ向かうとき、最もよい走り方はどれですか。","choices":["一塁の手前で急ブレーキする","全力で走り、一塁を駆け抜ける","コーチとハイタッチしてから走る","一塁手に「捕らんといて」とお願いする"],"correctIndex":1,"explanation":"内野ゴロでは、打ったらすぐに全力で一塁へ走り、基本的には一塁を駆け抜けます。ダブルベースを使う大会では通常、打者走者はカラー側を使用します。","source":"JSA 2026オフィシャルソフトボールルール・JSAルール改正点","sourceUrl":"https://www.softball.or.jp/bulletin/index/pdf/2026_Rule_Changes.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-02","course":"player","category":"走塁","difficulty":2,"funny":true,"question":"一死三塁。打者が外野フライを打ち、外野手が捕球しました。三塁走者はどうしますか。","choices":["捕られる前から本塁へ走る","三塁に触れた状態で待ち、野手が打球に最初に触れた後に本塁を狙う","ベンチへ帰る","外野手にボールを返してもらう"],"correctIndex":1,"explanation":"捕球されるフライでは、走者は元の塁に触れて待ち、野手が打球に最初に触れた後に進塁できます。これがタッチアップです。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-03","course":"player","category":"離塁","difficulty":2,"funny":false,"question":"日本国内の一般的なJSAルールで、走者が塁を離れられる基本的なタイミングはいつですか。","choices":["投手が投球動作を始めた瞬間","投手の手からボールが離れたとき","捕手がミットを動かしたとき","走者が行けると思ったとき"],"correctIndex":1,"explanation":"国内の一般的なファストピッチでは、投手の手からボールが離れるまで走者は塁を離れられません。大会特別ルールがある場合は大会要項を優先します。","source":"JSA 2026オフィシャルソフトボールルール・JSAルール改正点","sourceUrl":"https://www.softball.or.jp/bulletin/index/pdf/2026_Rule_Changes.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-04","course":"player","category":"走塁判断","difficulty":2,"funny":true,"question":"外野へのヒットで一塁走者が二塁へ向かっています。三塁まで行けるか迷ったとき、最もよい行動はどれですか。","choices":["二塁へ着く前に三塁コーチを確認する","観客の声が大きい方向へ走る","じゃんけんで決める","グラウンドを一周する"],"correctIndex":0,"explanation":"走者はボールの位置とランナーコーチの指示を確認します。次の塁へ進む前に、早めにコーチを見る習慣が大切です。","source":"日本スポーツ協会 子どものスポーツ指導資料・倫理ガイドライン","sourceUrl":"https://www.japan-sports.or.jp/Portals/0/data/supoken/doc/jspo-acp/jspo-acp_chapter4.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-05","course":"player","category":"打球判定","difficulty":1,"funny":false,"question":"打者が打ったファウルフライを野手が地面に落ちる前に正しく捕球しました。どうなりますか。","choices":["ファウルなので打ち直し","打者アウト","ボール","全走者が一つ進む"],"correctIndex":1,"explanation":"フェア地域でもファウル地域でも、打球が地面に触れる前に正しく捕球されれば打者はアウトです。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-06","course":"player","category":"走路","difficulty":2,"funny":true,"question":"走者が野手のタッチを避けるため、走路から大きく外れて逃げました。どうなる可能性がありますか。","choices":["逃げ切ればセーフ","走路を大きく外れたためアウト","かくれんぼボーナス","野手も同じ方向へ逃げる"],"correctIndex":1,"explanation":"タッチを避けるため、走者が基準となる走路から規定範囲を超えて外れるとアウトになります。危険な接触も避けます。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-07","course":"player","category":"得点","difficulty":3,"funny":false,"question":"二死満塁。打者の内野ゴロで三塁走者は本塁を踏みましたが、その直後に打者走者が一塁到達前にアウトになりました。得点はどうなりますか。","choices":["1点入る","得点は入らない","次の回へ持ち越す","0.5点入る"],"correctIndex":1,"explanation":"第3アウトが打者走者の一塁到達前のアウト、またはフォースアウトの場合、そのプレー中の得点は認められません。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-08","course":"player","category":"安全用具","difficulty":1,"funny":true,"question":"打者走者が「髪形が乱れるから」と走りながら自分でヘルメットを投げました。正しい行動はどれですか。","choices":["できるだけ遠くへ投げる","ヘルメットを正しく着用したまま走る","一塁手へ預ける","ベンチへ送球する"],"correctIndex":1,"explanation":"打者、打者走者、走者は承認されたヘルメットを正しく着用します。故意に脱いだり投げたりしてはいけません。","source":"JSA 2026オフィシャルソフトボールルール・JSAルール改正点","sourceUrl":"https://www.softball.or.jp/bulletin/index/pdf/2026_Rule_Changes.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-09","course":"player","category":"守備連係","difficulty":1,"funny":true,"question":"内野と外野の間にフライが上がりました。最も安全でよい行動はどれですか。","choices":["全員が無言で突っ込む","捕る選手が早く大きな声で「オーライ」と伝える","全員でボールを囲む","監督が捕りに行く"],"correctIndex":1,"explanation":"捕る選手が早く大きな声を出すことで衝突を防げます。ほかの選手はカバーへ回ります。","source":"日本スポーツ協会 子どものスポーツ指導資料・倫理ガイドライン","sourceUrl":"https://www.japan-sports.or.jp/Portals/0/data/supoken/doc/jspo-acp/jspo-acp_chapter4.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-10","course":"player","category":"打球と走者","difficulty":3,"funny":false,"question":"野手がまだ触れていないフェア打球が、守備機会のある内野手より前で走者に当たりました。どうなる可能性がありますか。","choices":["走者アウト","自動的にホームラン","打ち直し","当たった走者に2点"],"correctIndex":0,"explanation":"守備機会のある内野手より前で、まだ野手が触れていないフェア打球が走者に当たると、原則として走者アウトになります。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-11","course":"player","category":"走塁妨害","difficulty":2,"funny":true,"question":"ボールを持っておらず、プレーにも関係していない野手が走者の進路をふさいでいます。走者はどうしますか。","choices":["全力で突き飛ばす","危険な接触を避けてプレーを続け、審判の判断に従う","野手をくすぐる","その場で試合終了を宣言する"],"correctIndex":1,"explanation":"ボールを持たない野手が走者の進塁を妨げると走塁妨害になる場合があります。走者は危険な接触を避け、審判の判定に従います。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"","ballStatus":"","runnerPlacement":""},{"id":"player-12","course":"player","category":"安全","difficulty":1,"funny":false,"question":"次の打者が素振りをするときに適切な場所はどこですか。","choices":["ベンチの真ん中","捕手のすぐ後ろ","指定されたネクストバッターズサークル","一塁ベースの上"],"correctIndex":2,"explanation":"次の打者はヘルメットを着用し、周囲の安全を確認して指定場所で準備します。","source":"JSA 2026オフィシャルソフトボールルール・JSAルール改正点","sourceUrl":"https://www.softball.or.jp/bulletin/index/pdf/2026_Rule_Changes.pdf ch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"後位走者アウト","ballStatus":"インプレー","runnerPlacement":"前位走者は二塁を占有できる"},{"id":"umpire-23","course":"umpire","category":"離塁","difficulty":5,"funny":false,"question":"日本国内のJSAルールで、走者が投手の手からボールが離れる前に塁を離れました。正しい処置はどれですか。","choices":["投球は有効で走者だけアウト","ノーピッチ、走者アウト、他の走者は戻る","不正投球で全走者一つ進塁","一度目は警告だけ"],"correctIndex":1,"explanation":"国内の一般的なJSAルールでは、投手の手からボールが離れる前の離塁はアウトで、ノーピッチとして処置します。大会要項を優先します。","source":"JSA 2026オフィシャルソフトボールルール・JSAルール改正点","sourceUrl":"https://www.softball.or.jp/bulletin/index/pdf/2026_Rule_Changes.pdf","ruling":"離塁アウト、ノーピッチ","ballStatus":"ボールデッド","runnerPlacement":"他の走者を投球時の塁へ戻す"},{"id":"umpire-24","course":"umpire","category":"ルックバック","difficulty":5,"funny":false,"question":"投手がボールを持ってピッチャーズサークル内にいます。走者が塁間で止まり、進むことも戻ることもせず様子を見続けました。正しい処置はどれですか。","choices":["何秒でも止まれる","走者アウト","投手に警告","自動的に元の塁へ戻す"],"correctIndex":1,"explanation":"投手がサークル内でボールを保持しているとき、塁を離れている走者は直ちに進むか戻る行動を取らなければなりません。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"走者アウト","ballStatus":"ボールデッド","runnerPlacement":"他の走者は違反時の規定に従って戻す"},{"id":"umpire-25","course":"umpire","category":"打球が走者に当たる","difficulty":5,"funny":false,"question":"野手がまだ触れていないフェア打球が、守備機会のある内野手より前で二塁走者に当たりました。正しい処置はどれですか。","choices":["インプレー","ボールデッド、走者アウト","打者アウト","全員一つ進塁"],"correctIndex":1,"explanation":"守備機会のある内野手より前で、まだ野手が触れていないフェア打球が走者に当たると、原則として走者アウトです。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"打球に当たった走者アウト","ballStatus":"ボールデッド","runnerPlacement":"打者走者に一塁を与え、他の走者は規定に従って戻す"},{"id":"umpire-26","course":"umpire","category":"打球が走者に当たる","difficulty":5,"funny":false,"question":"フェア打球が遊撃手を通過し、ほかにアウトにできる野手もいない状態で走者に当たりま ":"umpire-30","course":"umpire","category":"安全進塁権","difficulty":5,"funny":false,"question":"次の組み合わせで正しいものはどれですか。①ボールを持たない野手が走者を妨げた ②野手の送球が競技場外へ出た ③野手が外したグラブを投げてフェア打球に当てた","choices":["①直ちにボールデッド ②1個進塁 ③打者アウト","①ディレードデッドボール ②送球時を基準に2個進塁 ③投球時を基準に3個進塁","①処置なし ②投球時から1個 ③ホームラン","①走者アウト ②2個 ③ボールデッドで1個"],"correctIndex":1,"explanation":"走塁妨害は原則ディレードデッドボールです。場外へ出た送球は送球時を基準に2個、外したグラブをフェア打球に当てた場合は投球時を基準に3個の安全進塁権が基本です。","source":"WBSC 2026–2029 Official Rules of Softball – Fast Pitch","sourceUrl":"https://static.wbsc.org/uploads/federations/0/cms/documents/b5f6e3da-619d-2aa4-0d25-2ec00549b45d.pdf","ruling":"各違反を宣告して適切な塁を付与","ballStatus":"①ディレードデッド、②ボールデッド、③ディレードデッド","runnerPlacement":"①妨害がなければ到達した塁、②送球時から2個、③投球時から3個"}];

function drawStadium(c,w,h){let sky=c.createLinearGradient(0,0,0,h*.38);sky.addColorStop(0,'#102651');sky.addColorStop(1,'#2f7ec0');c.fillStyle=sky;c.fillRect(0,0,w,h*.38);c.fillStyle='#111a2a';c.fillRect(0,h*.18,w,h*.22);for(let y=h*.2;y<h*.38;y+=13){for(let x=5;x<w;x+=12){let r=(Math.sin(x*12.3+y)*.5+.5);c.fillStyle=r>.55?'#d6d6d2':'#31425b';c.fillRect(x,y,4,4)}}c.fillStyle='#0f5b3e';c.beginPath();c.moveTo(0,h*.36);c.lineTo(w,h*.36);c.lineTo(w,h*.68);c.lineTo(0,h*.62);c.closePath();c.fill();c.fillStyle='#8c4e2d';c.beginPath();c.moveTo(0,h*.62);c.lineTo(w,h*.68);c.lineTo(w,h);c.lineTo(0,h);c.closePath();c.fill();c.strokeStyle='rgba(255,255,255,.72)';c.lineWidth=2;c.beginPath();c.moveTo(w*.49,h*.96);c.lineTo(w*.16,h*.67);c.moveTo(w*.49,h*.96);c.lineTo(w*.84,h*.68);c.stroke();c.fillStyle='#b8753b';c.beginPath();c.ellipse(w*.5,h*.46,w*.07,h*.025,0,0,Math.PI*2);c.fill();drawLight(c,w*.05,h*.06);drawLight(c,w*.95,h*.06);c.fillStyle='rgba(1,10,25,.82)';c.fillRect(w*.03,h*.11,w*.24,h*.095);c.strokeStyle='#e8bb43';c.strokeRect(w*.03,h*.11,w*.24,h*.095);c.fillStyle='#fff';c.font=`bold ${Math.max(10,w*.027)}px sans-serif`;c.fillText('北っ子 FIRE',w*.05,h*.145);c.fillStyle='#ffd24a';c.fillText('0 - 0',w*.08,h*.18)}

function drawPitcher(c,w,h,b,now){const t=b.phase==='windup'?clamp((now-b.start)/b.releaseAt,0,1):b.phase==='pitch'?1:0,x=w*.5,y=h*.43,s=Math.max(.42,w/390*.52);c.save();c.translate(x,y);c.scale(s,s);c.fillStyle='rgba(0,0,0,.3)';c.beginPath();c.ellipse(0,88,42,10,0,0,Math.PI*2);c.fill();c.fillStyle='#f1b185';c.beginPath();c.arc(0,-48,14,0,Math.PI*2);c.fill();c.fillStyle='#091a39';c.beginPath();c.arc(0,-52,15,Math.PI,0);c.fill();c.fillStyle='#0b274f';roundRect(c,-18,-33,36,55,8);c.fill();c.fillStyle='white';roundRect(c,-16,20,13,55,6);c.fill();roundRect(c,3,20,13,55,6);c.fill();let armAng=-.4+t*Math.PI*2.05;c.strokeStyle='#f1b185';c.lineWidth=9;c.lineCap='round';c.beginPath();c.moveTo(13,-22);c.lineTo(13+Math.cos(armAng)*34,-22+Math.sin(armAng)*34);c.stroke();c.strokeStyle='#e97d21';c.lineWidth=11;c.beginPath();c.moveTo(-13,-22);c.lineTo(-29,-2);c.stroke();c.restore()}
function drawStrikeZone(c,w,h,b){const zx=w*.41,zy=h*.64,zw=w*.19,zh=h*.19;c.save();c.fillStyle='rgba(81,164,255,.11)';c.fillRect(zx,zy,zw,zh);c.strokeStyle='rgba(255,255,255,.82)';c.lineWidth=2;c.strokeRect(zx,zy,zw,zh);c.strokeStyle='rgba(255,255,255,.22)';for(let i=1;i<3;i++){c.beginPath();c.moveTo(zx+zw*i/3,zy);c.lineTo(zx+zw*i/3,zy+zh);c.stroke();c.beginPath();c.moveTo(zx,zy+zh*i/3);c.lineTo(zx+zw,zy+zh*i/3);c.stroke()}c.restore()}
function drawBatter(c,w,h,b,now){const x=w*.79,y=h*.77,s=Math.max(.68,w/390*.78),sw=b.swingT||0;c.save();c.translate(x,y);c.scale(s,s);c.fillStyle='rgba(0,0,0,.35)';c.beginPath();c.ellipse(0,125,56,13,0,0,Math.PI*2);c.fill();c.fillStyle='#e9aa80';c.beginPath();c.arc(5,-65,24,0,Math.PI*2);c.fill();c.fillStyle='#0b3d77';c.beginPath();c.arc(5,-72,25,Math.PI,0);c.fill();c.fillStyle='#0874bb';roundRect(c,-30,-42,62,84,11);c.fill();c.fillStyle='white';roundRect(c,-26,38,22,78,8);c.fill();roundRect(c,7,38,22,78,8);c.fill();c.fillStyle='#124b90';roundRect(c,-32,112,32,14,4);c.fill();roundRect(c,5,112,34,14,4);c.fill();c.save();c.translate(-4,-24);c.rotate(-.55+sw*1.8);c.strokeStyle='#e7a579';c.lineWidth=12;c.lineCap='round';c.beginPath();c.moveTo(0,0);c.lineTo(30,-28);c.stroke();c.strokeStyle='#1c2433';c.lineWidth=9;c.beginPath();c.moveTo(28,-28);c.lineTo(82,-90);c.stroke();c.strokeStyle='#c4cbd3';c.lineWidth=5;c.beginPath();c.moveTo(81,-90);c.lineTo(110,-121);c.stroke();c.restore();c.restore()}
function drawBall(c,w,h,b,now){if(b.phase!=='pitch'||b.resolved)return;const p=clamp(b.progress,0,1.08),e=p*p*(3-2*p),sx=w*.5,sy=h*.405,zx=w*.5+b.courseX*w*.16,zy=h*.735+b.courseY*h*.18,x=sx+(zx-sx)*e,y=sy+(zy-sy)*e,size=4+e*17;c.save();c.shadowColor='rgba(255,245,150,.8)';c.shadowBlur=4+e*12;c.fillStyle='#fff6b5';c.beginPath();c.arc(x,y,size,0,Math.PI*2);c.fill();c.strokeStyle='#d62d2d';c.lineWidth=Math.max(1,size*.11);c.beginPath();c.arc(x,y,size*.62,-1.2,1.2);c.stroke();c.restore()}
function drawFlyBall(c,w,h,f){const t=f.t;if(f.type==='hr'){const x=w*.52+Math.sin(t*Math.PI)*w*.18,y=h*.66-t*h*.72,size=18*(1-t)+3;c.save();c.shadowColor='#ff7718';c.shadowBlur=18;c.strokeStyle=`rgba(255,96,0,${1-t})`;c.lineWidth=8;c.beginPath();c.moveTo(x,y+45);c.lineTo(x,y);c.stroke();c.fillStyle='#fff7af';c.beginPath();c.arc(x,y,size,0,Math.PI*2);c.fill();c.restore()}else{const x=w*.55-t*w*.25,y=h*.66-t*h*.36+t*t*h*.25,size=15*(1-t)+4;c.fillStyle='#fff5ae';c.beginPath();c.arc(x,y,size,0,Math.PI*2);c.fill()}}
function drawParticles(c,b){b.particles=b.particles.filter(p=>p.life>0);for(const p of b.particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.025;c.globalAlpha=Math.max(0,p.life);c.fillStyle=p.color;c.beginPath();c.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);c.fill()}c.globalAlpha=1}
function roundRect(c,x,y,w,h,r){c.beginPath();c.roundRect?c.roundRect(x,y,w,h,r):(c.rect(x,y,w,h));}
function practiceNext(){state.practice.round++;startBatting('practice')}function practiceResult(){const p=state.practice;progress.practiceBest=Math.max(progress.practiceBest,p.hr);progress.practicePlays++;save();state.view='practice-result';app.innerHTML=`<section class="screen"><header class="screen-head"><h1>ホームランチャレンジ結果</h1><div class="screen-sub">練習モード｜クイズ得点には影響しません</div></header><div class="result"><h2 style="text-align:center">${p.hr===3?'👑 3球連続ホームラン！':p.hr?'🔥 ナイスチャレンジ！':'次はスタンドへ！'}</h2><div style="text-align:center;font-size:4rem;font-weight:1000;color:#d52a1c">${p.hr}<small style="font-size:1rem"> / 3本</small></div><div class="score-grid"><div class="score-cell"><small>本塁打</small><strong>${p.hr}</strong></div><div class="score-cell"><small>ヒット</small><strong>${p.hit}</strong></div><div class="score-cell"><small>アウト</small><strong>${p.out}</strong></div></div><p style="text-align:center">自己ベスト：3球中 <strong>${progress.practiceBest}</strong> 本</p><button class="primary" data-action="practice-retry">もう一度挑戦</button><button class="secondary" data-action="home">トップへ戻る</button></div></section>`;window.scrollTo(0,0)}
function renderResult(){if(!state.last)return goHome();const r=state.last,c=COURSES[state.course],perfect=r.total===100,badge=progress.courses[state.course].badge,batText={hr:'ホームラン','perfect-hit':'完璧タイミングのヒット',hit:'ヒット',miss:'空振り',look:'見逃しアウト'}[r.battingResult]||'';app.innerHTML=`<section class="screen"><header class="screen-head"><h1>${perfect?'🔥 完全クリア！':'コース結果'}</h1><div class="screen-sub">${esc(c.title)}</div></header><div class="result"><div class="result-rank">${rankMarkup(r.rank)}<div><small>獲得ランク</small><h2>RANK ${r.rank.id}<br>${esc(r.rank.name)}</h2><p>${badge?'🏅 '+esc(c.badge)+'を獲得！':'あと少しでコースバッジ獲得！'}</p></div></div><div class="score-grid"><div class="score-cell"><small>クイズ</small><strong>${r.quizScore}</strong></div><div class="score-cell"><small>${batText}</small><strong>${r.battingScore}</strong></div><div class="score-cell"><small>合計</small><strong>${r.total}</strong></div></div>${perfect?'<h2 style="text-align:center;color:#d62b1b">全問正解＋ファイヤーホームラン！</h2>':''}<button class="primary" data-action="review">間違えた問題を復習</button><button class="secondary" data-action="retry-course">もう一度挑戦</button><button class="secondary" data-action="home">トップへ戻る</button></div></section>`;bindRankFallback();if(perfect)celebrate();window.scrollTo(0,0)}
function renderReview(){const wrong=state.last?.wrong||[];app.innerHTML=`<section class="screen"><header class="screen-head"><div class="screen-head-row"><div><h1>間違えた問題の復習</h1><div class="screen-sub">得点は変更されません</div></div><button class="home-small" data-action="home">⌂ トップ</button></div></header><div class="result">${wrong.length?wrong.map((a,i)=>`<article class="review-item"><h3>${i+1}. ${esc(a.question)}</h3><p><strong>自分の答え：</strong>${esc(a.selected)}<br><strong>正しい答え：</strong>${esc(a.correct)}</p><p>${esc(a.explanation)}</p>${a.ruling?`<p><strong>宣告：</strong>${esc(a.ruling)}<br><strong>ボール：</strong>${esc(a.ballStatus)}<br><strong>走者：</strong>${esc(a.runnerPlacement)}</p>`:''}</article>`).join(''):'<p style="text-align:center">全問正解です！復習する問題はありません。</p>'}<button class="secondary" data-action="show-result">結果へ戻る</button></div></section>`;window.scrollTo(0,0)}
function howto(){showModal(`<h2>遊び方</h2><ol><li>4つのコースから挑戦します。</li><li>4択問題に答え、解説と根拠を確認します。</li><li>全問題終了後は1球勝負の打撃チャレンジです。</li><li>クイズ90点＋打撃10点で100点満点です。</li><li>トップのホームランチャレンジは3球の練習モードです。</li></ol><button class="primary" data-action="close-modal">閉じる</button>`)}
function celebrate(){const colors=['#ff7b00','#ffd44e','#d3261d','#fff'];for(let i=0;i<36;i++){let x=document.createElement('i');x.style.cssText=`position:fixed;z-index:300;left:${Math.random()*100}vw;top:-20px;width:7px;height:12px;background:${colors[i%4]};transform:rotate(${Math.random()*180}deg);animation:fall ${1.6+Math.random()}s linear forwards`;document.body.appendChild(x);setTimeout(()=>x.remove(),2800)}if(!document.getElementById('fallStyle')){let s=document.createElement('style');s.id='fallStyle';s.textContent='@keyframes fall{to{transform:translateY(110vh) rotate(680deg);opacity:.2}}';document.head.appendChild(s)}}
function tone(type){if(!progress.sound)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain(),now=audioCtx.currentTime;let f={correct:620,wrong:170,pitch:260,hit:420,homerun:760}[type]||330;o.frequency.setValueAtTime(f,now);if(type==='homerun')o.frequency.exponentialRampToValueAtTime(1300,now+.35);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.42);o.connect(g).connect(audioCtx.destination);o.start(now);o.stop(now+.43)}catch(e){console.warn(e)}}
function toggleSound(){progress.sound=!progress.sound;save();soundBtn.textContent=progress.sound?'🔊':'🔇';if(state.view==='home')renderHome()}
function resetData(){showModal(`<h2>データ初期化</h2><p>最高得点、バッジ、練習記録をすべて消します。続けますか？</p><button class="primary" data-action="reset-confirm-1">次へ</button><button class="secondary" data-action="close-modal">やめる</button>`)}
function startupError(e){console.error(e);stopAnimation();app.innerHTML=`<div class="startup"><h2>ゲームの起動に失敗しました</h2><p>ページを再読み込みしてください。</p><details><summary>エラー内容</summary><pre style="white-space:pre-wrap;text-align:left">${esc(e?.message||e)}</pre></details></div>`}
function handleAction(t){const a=t.dataset.action;if(!a)return;if(a==='home')goHome();else if(a==='confirm-home'){closeModal();goHome()}else if(a==='close-modal')closeModal();else if(a==='show-courses')document.getElementById('courses')?.scrollIntoView({behavior:'smooth'});else if(a==='practice'){state.practice={round:1,hr:0,hit:0,out:0};startBatting('practice')}else if(a==='start-course')startCourse(t.dataset.course);else if(a==='answer')answer(Number(t.dataset.index));else if(a==='next-question')nextQuestion();else if(a==='quiz-home'||a==='bat-home')goHome(true);else if(a==='pitch')pitch();else if(a==='swing')swing();else if(a==='practice-next')practiceNext();else if(a==='practice-result')practiceResult();else if(a==='practice-retry'){state.practice={round:1,hr:0,hit:0,out:0};startBatting('practice')}else if(a==='show-result')renderResult();else if(a==='review')renderReview();else if(a==='retry-course')startCourse(state.course);else if(a==='howto')howto();else if(a==='toggle-sound')toggleSound();else if(a==='reset')resetData();else if(a==='reset-confirm-1')showModal(`<h2>本当に削除しますか？</h2><p>この操作は元に戻せません。</p><button class="primary" data-action="reset-confirm-2">すべて削除</button><button class="secondary" data-action="close-modal">やめる</button>`);else if(a==='reset-confirm-2'){progress=defaults();save();closeModal();renderHome()}}
document.addEventListener('click',e=>{const t=e.target.closest('[data-action]');if(t)handleAction(t)});soundBtn.addEventListener('click',toggleSound);brandBtn.addEventListener('click',()=>goHome(state.view!=='home'));window.addEventListener('resize',()=>{if(state.view==='batting'){setupCanvas();drawGame(performance.now())}});window.addEventListener('pagehide',stopAnimation);document.addEventListener('visibilitychange',()=>{if(document.hidden)stopAnimation()});
try{if(QUESTIONS.length!==90)throw new Error(`問題数が90問ではありません：${QUESTIONS.length}`);soundBtn.textContent=progress.sound?'🔊':'🔇';renderHome()}catch(e){startupError(e)}
})();
</script>
</body></html>
